<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --paper: #efe9da;
    --ink: #2b2b28;
    --ink-soft: #6b6558;
    --indigo: #223a5e;
    --indigo-soft: #3d5578;
    --vermillion: #c23c2f;
    --line: #cfc6ac;
    --dot-color: rgba(43,43,40,0.05);
    --indigo-soft-rgb: 61, 85, 120;
    --vermillion-rgb: 194, 60, 47;
    --overlap-rgb: 180, 130, 20;
    --overlap-yes-rgb: 60, 55, 55;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body.theme-b {
    --paper: #eef6ee;
    --ink: #24352a;
    --ink-soft: #5d7869;
    --indigo: #2f7d5c;
    --indigo-soft: #4f9c78;
    --vermillion: #d98a4f;
    --line: #c3ddc9;
    --dot-color: rgba(47, 125, 92, 0.06);
    --indigo-soft-rgb: 79, 156, 120;
    --vermillion-rgb: 217, 138, 79;
    --overlap-rgb: 90, 150, 200;
    --overlap-yes-rgb: 180, 150, 90;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body.theme-c {
    --paper: #fff3ea;
    --ink: #3a2418;
    --ink-soft: #8a6a56;
    --indigo: #e2632a;
    --indigo-soft: #f08a4f;
    --vermillion: #7a8a3a;
    --line: #f0d2b8;
    --dot-color: rgba(226, 99, 42, 0.07);
    --indigo-soft-rgb: 240, 138, 79;
    --vermillion-rgb: 122, 138, 58;
    --overlap-rgb: 90, 150, 200;
    --overlap-yes-rgb: 180, 150, 90;
    --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, var(--dot-color) 1px, transparent 0);
    background-size: 18px 18px;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 14px 16px 30px;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 10px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    margin-bottom: 3px;
  }

  .question {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.35;
    color: var(--indigo);
    padding: 3px 8px;
    border-bottom: 1px dashed var(--line);
    display: inline-block;
    min-width: 60%;
    outline: none;
    cursor: text;
  }
  .question:focus { border-bottom-color: var(--indigo); }
  .question-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0 8px;
  }
  .nav button {
    background: none;
    border: 1px solid var(--indigo);
    color: var(--indigo);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav button:hover { background: var(--indigo); color: var(--paper); }
  .nav .month-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .grid-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 10px 12px;
    box-shadow: 0 1px 0 rgba(43,43,40,0.04);
  }

  .weekdays, .days {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }
  .weekdays {
    margin-bottom: 8px;
  }
  .weekdays div {
    text-align: center;
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }
  .weekdays div:nth-last-child(2) { color: var(--indigo-soft); }
  .weekdays div:last-child { color: var(--vermillion); }

  .days {
    grid-auto-rows: 70px;
  }

  .day-cell {
    position: relative;
    height: 70px;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    font-size: 13px;
    background: rgba(255,255,255,0.35);
    border: 1px solid transparent;
    overflow: visible;
    padding: 3px 4px;
  }
  .day-cell.empty { background: none; }
  .day-cell.today {
    border-color: transparent;
  }
  @property --ring-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  .day-cell.today::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 6px;
    padding: 3px;
    background: conic-gradient(from var(--ring-angle), #ffd1e8, #ff5fa8, #ffb6dd, #ff2f92, #ffd1e8);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: 2;
    animation: spin-today-ring 3s linear infinite;
  }

  @keyframes spin-today-ring {
    from { --ring-angle: 0deg; }
    to   { --ring-angle: 360deg; }
  }
  .day-cell.future { opacity: 0.35; }

  .day-cell.predicted-pulse {
    animation: heartbeat-pulse 1.5s ease-in-out infinite;
  }
  @keyframes heartbeat-pulse {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.07); }
    28% { transform: scale(1); }
    42% { transform: scale(1.07); }
    70% { transform: scale(1); }
  }

  .cell-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    min-height: 12px;
  }

  .day-num {
    font-size: 10px;
    line-height: 1;
    color: var(--ink-soft);
  }

  .icon-row {
    display: flex;
    align-items: center;
    gap: 1px;
    height: 14px;
  }
  .icon-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 13px;
    height: 13px;
    font-size: 10px;
    line-height: 1;
    overflow: visible;
  }

  .cell-main {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .cell-top, .cell-main {
    position: relative;
    z-index: 1;
  }

  .day-cell.answer-yes {
    background: rgba(var(--indigo-soft-rgb), 0.32);
  }
  .day-cell.answer-no {
    background: rgba(var(--vermillion-rgb), 0.28);
  }

  .day-cell.overlap-no {
    background: rgba(var(--overlap-rgb), 0.38);
  }

  .day-cell.overlap-yes {
    background: rgba(var(--overlap-yes-rgb), 0.30);
  }

  .day-cell.hangover-day {
    background: rgba(120, 120, 120, 0.35) !important;
  }
  .day-cell.hangover-morning::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 34%;
    background: rgba(120, 120, 120, 0.34);
    clip-path: polygon(
      0% 0%, 100% 0%,
      100% 55%,
      88% 100%, 76% 58%,
      64% 100%, 52% 58%,
      40% 100%, 28% 58%,
      16% 100%, 4% 58%,
      0% 90%
    );
    z-index: 0;
    pointer-events: none;
  }
  .hangover-bridge {
    position: absolute;
    top: 0;
    right: -6px;
    width: 6px;
    height: 34%;
    background: rgba(120, 120, 120, 0.34);
    z-index: 0;
    pointer-events: none;
  }

  .cry-icon {
    font-size: 32px;
    line-height: 1;
  }

  .mark-yes.predicted {
    border-style: dashed;
    opacity: 0.6;
  }
  .stamp.predicted {
    border-style: dashed;
    opacity: 0.6;
    box-shadow: none;
  }
  .predicted-label {
    font-size: 8px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .confirm-nudge {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--vermillion);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 3;
    animation: nudge-blink 1s steps(1) infinite;
  }
  .confirm-nudge::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--vermillion);
  }
  @keyframes nudge-blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  .day-cell.date-saturday .day-num {
    color: var(--indigo-soft);
    font-weight: 700;
  }
  .day-cell.date-sunday-or-holiday .day-num {
    color: var(--vermillion);
    font-weight: 700;
  }

  .day-cell.chain-left {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }
  .day-cell.chain-right {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }

  .day-cell.chain-left::before,
  .day-cell.chain-right::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    z-index: 0;
  }
  .day-cell.chain-left::before { left: -6px; }
  .day-cell.chain-right::after { right: -6px; }

  .day-cell.answer-yes.chain-left::before,
  .day-cell.answer-yes.chain-right::after {
    background: rgba(var(--indigo-soft-rgb), 0.32);
  }
  .day-cell.answer-no.chain-left::before,
  .day-cell.answer-no.chain-right::after {
    background: rgba(var(--vermillion-rgb), 0.28);
  }

  .day-cell.overlap-no.chain-left::before,
  .day-cell.overlap-no.chain-right::after {
    background: rgba(var(--overlap-rgb), 0.38);
  }

  .day-cell.overlap-yes.chain-left::before,
  .day-cell.overlap-yes.chain-right::after {
    background: rgba(var(--overlap-yes-rgb), 0.30);
  }

  .btn-pair {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 10px;
    width: 100%;
    align-items: center;
  }
  .btn-pair button {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: var(--font-body);
    width: 44px;
  }
  .btn-pair button.yes:hover { border-color: var(--indigo); color: var(--indigo); }
  .btn-pair button.no:hover { border-color: var(--vermillion); color: var(--vermillion); }

  .mark-yes {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--indigo-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
  }

  .sigh-mark {
    transform: rotate(6deg);
  }
  @keyframes sigh-droop {
    0%   { transform: translateY(-8px) rotate(0deg) scale(1.2); opacity: 0; }
    35%  { opacity: 1; }
    70%  { transform: translateY(2px) rotate(8deg) scale(0.95); }
    100% { transform: translateY(0) rotate(6deg) scale(1); opacity: 1; }
  }
  .sigh-droop-anim {
    animation: sigh-droop 0.9s cubic-bezier(0.4, 0, 0.6, 1);
  }

  .wine-mark {
    transform-origin: 65% 85%;
  }
  @keyframes wine-tip {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-12deg) scale(1.05); }
    50%  { transform: rotate(35deg) scale(1.1); }
    70%  { transform: rotate(22deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .wine-tip-anim {
    animation: wine-tip 0.8s ease-in-out;
    transform-origin: 65% 85%;
  }

  .stamp {
    width: 34px;
    height: 34px;
    border: 2px solid var(--vermillion);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--vermillion);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.03em;
    position: relative;
    transform: rotate(-8deg);
    box-shadow: 0 0 0 1px rgba(194,60,47,0.15) inset;
    overflow: visible;
  }
  .stamp::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--vermillion);
    border-radius: 50%;
    opacity: 0.6;
  }

  .stamp.stamp-slam {
    animation: stamp-slam 0.45s cubic-bezier(0.2, 0.9, 0.4, 1);
  }
  @keyframes stamp-slam {
    0%   { transform: scale(2.4) rotate(-8deg); opacity: 0; }
    55%  { transform: scale(0.85) rotate(-8deg); opacity: 1; }
    75%  { transform: scale(1.08) rotate(-8deg); }
    100% { transform: scale(1) rotate(-8deg); }
  }

  .clear-btn {
    position: absolute;
    bottom: 2px;
    font-size: 9px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    opacity: 0.5;
  }
  .clear-btn:hover { opacity: 1; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px 18px;
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot-yes {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid var(--indigo-soft);
  }
  .legend .dot-no {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid var(--vermillion);
  }
  .legend .dot-overlap {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(var(--overlap-rgb), 0.6);
    border: 1.5px solid rgba(var(--overlap-rgb), 0.9);
  }

  .summary {
    text-align: center;
    margin-top: 26px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .summary b { color: var(--vermillion); font-size: 15px; }

  .loading {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-soft);
    padding: 40px 0;
    font-size: 13px;
  }

  .today-tap {
    font-size: 18px;
    width: 30px;
    height: 30px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid var(--indigo);
    background: var(--indigo);
    color: var(--paper);
    cursor: pointer;
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    animation: tap-pulse 1.4s ease-in-out infinite;
  }
  @keyframes tap-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--indigo-soft-rgb), 0.5); }
    50% { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(var(--indigo-soft-rgb), 0); }
  }

  .day-cell.clickable {
    cursor: pointer;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,14,0.5);
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal-box {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 30px 26px 24px;
    max-width: 300px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 40px rgba(20,18,14,0.28);
  }
  .modal-question {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 19px;
    color: var(--indigo);
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .modal-date {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }
  .modal-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal-buttons button {
    padding: 15px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    border: none;
  }
  .modal-yes {
    background: var(--indigo);
    color: white;
  }
  .modal-no {
    background: white;
    border: 2px solid var(--vermillion) !important;
    color: var(--vermillion);
  }
  .modal-status {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 16px;
  }
  .modal-clear {
    background: none;
    border: 1px solid var(--line) !important;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 10px !important;
  }
  .modal-close {
    display: block;
    margin: 16px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }

  .streak-banner {
    text-align: center;
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--vermillion);
    font-weight: 600;
    letter-spacing: 0.02em;
    min-height: 0;
  }

  .cross-summary {
    text-align: center;
    margin: 0 0 10px;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .today-status-icon {
    text-align: center;
    font-size: 24px;
    margin: 0 0 10px;
    line-height: 1;
    min-height: 0;
  }

  .stamp-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--vermillion);
    color: white;
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 700;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--paper);
  }  .weather-picker {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .weather-picker button {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 22px;
    padding: 12px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    width: 78px;
  }
  .weather-picker button span {
    font-size: 11px;
    font-family: var(--font-body);
    color: var(--ink-soft);
  }
  .weather-picker button:hover {
    border-color: var(--indigo);
  }
  .cal-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .cal-tab {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.5);
    color: var(--ink-soft);
    cursor: pointer;
    font-family: var(--font-body);
  }
  .cal-tab.active {
    background: var(--indigo);
    border-color: var(--indigo);
    color: var(--paper);
    font-weight: 600;
  }
  .backup-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-top: 16px;
  }
  .backup-row button {
    background: none;
    border: none;
    color: var(--indigo-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    font-family: var(--font-body);
  }

  .combo-row {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .combo-row:first-of-type {
    border-top: none;
    margin-top: 10px;
    padding-top: 0;
  }
  .combo-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .combo-buttons {
    gap: 8px !important;
  }
  .combo-buttons button {
    padding: 10px !important;
    font-size: 14px !important;
  }
  .quick-combo-btn {
    display: block;
    margin: 10px auto 4px;
    padding: 8px 14px;
    border-radius: 16px;
    border: 1px solid var(--vermillion);
    background: var(--paper);
    color: var(--vermillion);
    font-size: 12.5px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
  }

  .memo-section {
    margin: 8px 0 16px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    text-align: center;
  }
  .memo-btn {
    padding: 7px 16px;
    border-radius: 16px;
    border: 1px solid var(--indigo);
    background: var(--paper);
    color: var(--indigo);
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
  }
  .memo-btn.listening {
    background: var(--indigo);
    color: var(--paper);
    animation: memo-pulse 1s ease-in-out infinite;
  }
  @keyframes memo-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(var(--indigo-soft-rgb), 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(var(--indigo-soft-rgb), 0); }
  }
  .memo-status {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 6px;
    min-height: 0;
  }
  .memo-note {
    font-size: 12px;
    color: var(--ink);
    font-style: italic;
    background: rgba(var(--indigo-soft-rgb), 0.08);
    border-radius: 8px;
    padding: 6px 10px;
    margin-top: 8px;
    text-align: left;
  }
  .memo-note .memo-icon {

    font-style: normal;
    margin-right: 4px;
  }

  .month-banner {
    height: 110px;
    border-radius: 10px;
    margin-bottom: 14px;
    background-size: cover;
    background-position: center;
    border: 1px solid var(--line);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15), 0 1px 0 rgba(43,43,40,0.04);
    position: relative;
    overflow: hidden;
  }
  .month-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 55%, rgba(0,0,0,0.18) 100%);
  }

  .memo-bubble {
    position: relative;
    max-width: 90%;
    margin: 0 auto 14px;
    background: var(--paper);
    border: 1px solid var(--indigo-soft);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 12.5px;
    color: var(--ink);
    text-align: center;
    font-style: italic;
  }
  .memo-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: var(--indigo-soft);
  }
  .memo-bubble .memo-bubble-icon {
    font-style: normal;
    margin-right: 4px;
  }

  .celebration-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -30px;
    animation-name: petal-fall;
    animation-timing-function: ease-in;
    animation-fill-mode: forwards;
  }
  @keyframes petal-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(112vh) rotate(360deg); opacity: 0.15; }
  }
  .firework {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffdf7e, #ff5fa8, transparent 70%);
    animation: firework-pop 1.2s ease-out forwards;
  }
  @keyframes firework-pop {
    0%   { transform: scale(0); opacity: 1; }
    60%  { transform: scale(9); opacity: 0.8; }
    100% { transform: scale(15); opacity: 0; }
  }
  .weekly-insight-card {
    margin-top: 18px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(var(--indigo-soft-rgb), 0.06);
    text-align: center;
  }
  .weekly-insight-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .weekly-insight-text {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
  }
  .mood-splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 4px;
  }
  .mood-splash-emoji {
    font-size: 64px;
    line-height: 1;
    margin-bottom: 20px;
  }
  .splash-bounce {
    animation: splash-bounce 1.1s ease-in-out infinite;
  }
  @keyframes splash-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }
  .splash-wave {
    animation: splash-wave 1.6s ease-in-out infinite;
    transform-origin: 70% 70%;
  }
  @keyframes splash-wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(14deg); }
    75% { transform: rotate(-10deg); }
  }
  .splash-launch {
    animation: splash-launch 1.4s ease-in-out infinite;
  }
  @keyframes splash-launch {
    0% { transform: translateY(10px) scale(0.95); }
    50% { transform: translateY(-18px) scale(1.05); }
    100% { transform: translateY(10px) scale(0.95); }
  }
  .splash-wiggle {
    animation: splash-wiggle 0.9s ease-in-out infinite;
  }
  @keyframes splash-wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  .splash-spin {
    animation: splash-spin 2.4s linear infinite;
  }
  @keyframes splash-spin {
    from { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.15); }
    to { transform: rotate(360deg) scale(1); }
  }
  .splash-float {
    animation: splash-float 2.2s ease-in-out infinite;
  }
  @keyframes splash-float {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-10px) rotate(4deg); }
  }
</style>
</head>

<div class="wrap">
  <div class="cal-tabs">
    <button class="cal-tab active" data-cal="a">Calendar</button>
    <button class="cal-tab" data-cal="b">Alcohol</button>
    <button class="cal-tab" data-cal="c">Exercise</button>
  </div>

  <div class="header">
    <div class="eyebrow">DAILY CHECK-IN</div>
    <div class="question" id="question" contenteditable="true">Did you do it today?</div>
    <div class="question-hint">Tap to edit the question</div>
  </div>

  <div class="streak-banner" id="streakBanner"></div>
  <div class="cross-summary" id="crossSummary"></div>
  <div class="today-status-icon" id="todayStatusIcon"></div>

  <div class="nav">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel">—</div>
    <button id="nextMonth">›</button>
  </div>

  <div class="month-banner" id="monthBanner"></div>

  <div class="memo-bubble" id="memoBubble" style="display:none;"></div>

  <div class="grid-card">
    <div class="weekdays">
      <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div class="days" id="daysGrid">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <div class="legend">
    <span><span class="dot-yes"></span>Yes</span>
    <span><span class="dot-no"></span>No (recorded)</span>
    <span>☀️/☁️/🌧️ weather that day</span>
    <span>🙂→😍✨ keeps getting happier the longer your No streak runs</span>
    <span><span class="dot-overlap"></span>No on both calendars</span>
    <span>😭 Yes on both calendars</span>

  <div class="weekly-insight-card">
    <div class="weekly-insight-label">📊 This Week</div>
    <div class="weekly-insight-text" id="weeklyInsight">Loading…</div>
  </div>


  <div class="summary" id="summary"></div>

  <div class="backup-row">
    <button id="backupShareBtn" class="cal-sync-link">📤 Backup &amp; Share</button>
    <button id="restoreBtn" class="cal-sync-link">📥 Restore from backup</button>
    <button id="cloudSyncBtn" class="cal-sync-link">☁️ Cloud Sync setup</button>
    <button id="forceSyncBtn" class="cal-sync-link">🔄 Sync Now</button>
    <input type="file" id="restoreFileInput" accept=".json,application/json" style="display:none;">
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-question" id="modalQuestion">—</div>
    <div class="modal-date" id="modalDate">—</div>
    <div class="memo-section" id="memoSection"></div>
    <div id="modalBody"></div>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>

  const daysGrid = document.getElementById('daysGrid');
  const monthLabel = document.getElementById('monthLabel');
  const questionEl = document.getElementById('question');

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Japanese national holidays 2025-2027, per Cabinet Office (naikakufu) announcements.

    '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日','2025-02-23':'天皇誕生日',

    '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日','2025-10-13':'スポーツの日',

    '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日',
    '2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日','2026-05-04':'みどりの日',

    '2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
    '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日','2027-02-23':'天皇誕生日',
    '2027-03-21':'春分の日','2027-03-22':'休日','2027-04-29':'昭和の日','2027-05-03':'憲法記念日',
    '2027-05-04':'みどりの日','2027-05-05':'こどもの日','2027-07-19':'海の日','2027-08-11':'山の日',
    '2027-09-20':'敬老の日','2027-09-23':'秋分の日','2027-10-11':'スポーツの日','2027-11-03':'文化の日',

  };

  function holidayKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function holidayNameFor(year, month, day) {
    return HOLIDAYS_JP[holidayKey(year, month, day)] || '';
  }

  let current = new Date();
  current.setDate(1);
  let monthData = {}; // { "1": {a:"yes"|"no", w:"sunny"|"cloudy"|"rainy"}, ... } (or legacy plain string)

  function ansOf(entry) {
    if (!entry) return undefined;
    return typeof entry === 'string' ? entry : entry.a;
  }
  function weatherOf(entry) {
    return (entry && typeof entry === 'object') ? entry.w : undefined;
  }
  function weatherIcon(w) {
    if (w === 'sunny') return '☀️';
    if (w === 'cloudy') return '☁️';
    if (w === 'rainy') return '🌧️';
    return '';
  }
  const HAPPY_STAGES = ['🙂', '😊', '😄', '😁', '🤩', '🥳', '🤪', '😍'];
  const STAGE_WIDTH = 3; // days per stage before moving to a happier face

  const moodIconCache = {};
  const moodIconRequested = {};

  function getCachedMoodIcon(streak) {
    if (moodIconCache[streak]) return moodIconCache[streak];
    try {
      const v = localStorage.getItem(`yesno:mood-icon:${streak}`);
      if (v) {
        moodIconCache[streak] = v;
        return v;
      }
    } catch (e) { /* ignore */ }
    return null;
  }

  async function getAIMoodIcon(streak) {
    // AI-powered icon generation is disabled in this build; the hardcoded
    // progression in faceIconFor() is used instead.
    return null;
  }

  function requestMoodIcon(streak) {
    if (moodIconRequested[streak]) return;
    moodIconRequested[streak] = true;
    getAIMoodIcon(streak).then(icon => {
      if (icon) {
        moodIconCache[streak] = icon;
        try { localStorage.setItem(`yesno:mood-icon:${streak}`, icon); } catch (e) { /* ignore */ }
        render();
      }
    });
  }

  function faceIconFor(answer, streak) {
    if (!answer) return '';
    const good = isGoodAnswer(activeCal, answer);
    if (!good) return '😕';
    if (streak >= 1) {
      if (activeCal === 'a') {
        const aiIcon = getCachedMoodIcon(streak);
        if (aiIcon) return aiIcon;
        requestMoodIcon(streak); // fetches in the background; falls back to the table below meanwhile
      }
      const maxStageIndex = HAPPY_STAGES.length - 1;
      const stageIndex = Math.min(Math.floor((streak - 1) / STAGE_WIDTH), maxStageIndex);
      let icon = HAPPY_STAGES[stageIndex];
      if (stageIndex === maxStageIndex) {
        // once at the happiest face, keep escalating with extra sparkle for every few more days
        const daysAtMaxStage = streak - (maxStageIndex * STAGE_WIDTH + 1);
        const extraSparkles = Math.floor(daysAtMaxStage / 5) + 1;
        icon += '✨'.repeat(extraSparkles);
      }
      return icon;
    }
    return '';
  }

  let activeCal = 'a';

  // For Calendar and Alcohol, "No" is the on-track answer. For Exercise,
  // "Yes" is the on-track answer (you want a Yes streak, not a No streak).
  const GOOD_ANSWER = { a: 'no', b: 'no', c: 'yes' };
  function goodAnswerFor(cal) {
    return GOOD_ANSWER[cal] || 'no';
  }
  function isGoodAnswer(cal, val) {
    return val === goodAnswerFor(cal);
  }

  function questionKey(cal) {
    return cal === 'a' ? 'yesno:question' : `yesno:${cal}:question`;
  }

  const DEFAULT_QUESTIONS = {
    a: 'Did you do it today?',
    b: 'Did you drink today?',
    c: 'Did you exercise today?'
  };

  function getQuestionText(cal) {
    try {
      const v = localStorage.getItem(questionKey(cal));
      if (v) return v;
    } catch (e) { /* ignore */ }
    return DEFAULT_QUESTIONS[cal] || DEFAULT_QUESTIONS.a;
  }

  function isSameDay(a, b) {
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function loadQuestion() {
    try {
      const val = localStorage.getItem(questionKey(activeCal));
      questionEl.textContent = val || DEFAULT_QUESTIONS[activeCal] || DEFAULT_QUESTIONS.a;
    } catch (e) { console.error('load question failed', e); }
  }

  function saveQuestion() {
    try {
      localStorage.setItem(questionKey(activeCal), questionEl.textContent.trim());
      scheduleCloudSync();
    } catch (e) {
      console.error('save question failed', e);
    }
  }

  const streakBanner = document.getElementById('streakBanner');
  const monthCache = {};

  function monthKey(cal, year, month) {
    const suffix = `${year}-${String(month + 1).padStart(2, '0')}`;
    return cal === 'a' ? `yesno:${suffix}` : `yesno:${cal}:${suffix}`;
  }

  function getMonthData(cal, year, month) {
    const key = monthKey(cal, year, month);
    if (monthCache[key]) return monthCache[key];
    try {
      const raw = localStorage.getItem(key);
      monthCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error('load month failed', e);
      monthCache[key] = {};
    }
    return monthCache[key];
  }

  function trailingGoodStreak(cal, data, daysInMonth) {
    let streak = 0;
    for (let d = daysInMonth; d >= 1; d--) {
      if (isGoodAnswer(cal, ansOf(data[d]))) streak++;
      else break;
    }
    return streak;
  }

  function computeCurrentStreak() {
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    let day = today.getDate();
    let streak = 0;
    for (let i = 0; i < 3650; i++) {
      const data = getMonthData(activeCal, year, month);
      if (!isGoodAnswer(activeCal, ansOf(data[day]))) break;
      streak++;
      day--;
      if (day < 1) {
        month--;
        if (month < 0) { month = 11; year--; }
        day = new Date(year, month + 1, 0).getDate();
      }
    }
    return streak;
  }

  function updateStreakBanner() {
    const streak = computeCurrentStreak();
    const label = goodAnswerFor(activeCal) === 'yes' ? 'Yes' : 'No';
    streakBanner.textContent = streak >= 2 ? `🔥 ${streak}-day "${label}" streak` : '';
  }

  function triggerCelebration(intensity) {
    const overlay = document.createElement('div');
    overlay.className = 'celebration-overlay';
    document.body.appendChild(overlay);

    const petalCount = Math.min(70, 18 + intensity * 2);
    const emojis = ['🌸', '🌺', '✨'];
    for (let i = 0; i < petalCount; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      petal.style.left = (Math.random() * 100) + 'vw';
      petal.style.animationDuration = (2.2 + Math.random() * 2.2) + 's';
      petal.style.animationDelay = (Math.random() * 0.9) + 's';
      petal.style.fontSize = (14 + Math.random() * 16) + 'px';
      overlay.appendChild(petal);
    }

    if (intensity >= 20) {
      const fireworkCount = Math.min(8, Math.floor(intensity / 10));
      for (let i = 0; i < fireworkCount; i++) {
        const fw = document.createElement('div');
        fw.className = 'firework';
        fw.style.left = (10 + Math.random() * 80) + 'vw';
        fw.style.top = (8 + Math.random() * 40) + 'vh';
        fw.style.animationDelay = (Math.random() * 1.6) + 's';
        overlay.appendChild(fw);
      }
    }

    setTimeout(() => overlay.remove(), 4800);
  }

  function maybeCelebrateMilestone() {
    const streakA = computeCurrentStreakFor('a');
    const streakB = computeCurrentStreakFor('b');
    const bothRunning = streakA > 0 && streakB > 0;
    const hitMilestone = (streakA % 10 === 0) || (streakB % 10 === 0);
    if (bothRunning && hitMilestone) {
      triggerCelebration(Math.max(streakA, streakB));
    }
  }

  function countRecentYes(cal, days) {
    const today = new Date();
    let count = 0;
    for (let i = 0; i < days; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const data = getMonthData(cal, d.getFullYear(), d.getMonth());
      if (ansOf(data[d.getDate()]) === 'yes') count++;
    }
    return count;
  }

  function applyCalendarMoodColors(bg, accent) {
    document.body.style.setProperty('--paper', bg);
    document.body.style.setProperty('--indigo', accent);
  }

  function resetCalendarMoodColors() {
    document.body.style.removeProperty('--paper');
    document.body.style.removeProperty('--indigo');
  }

  async function getAICalendarMoodColors(cal, streak, recentYes) {
    // AI-generated mood colors are disabled in this build; the static theme
    // colors defined in :root / body.theme-b are used instead.
    return null;
  }

  async function updateCalendarMood() {
    const cal = activeCal;
    const streak = computeCurrentStreakFor(cal);
    const recentYes = countRecentYes(cal, 7);
    const cacheKey = `yesno:mood:${cal}:${streak}-${recentYes}`;
    let cached = null;
    try { cached = localStorage.getItem(cacheKey); } catch (e) { /* ignore */ }
    if (cached) {
      const [bg, accent] = cached.split('|');
      if (bg && accent) applyCalendarMoodColors(bg, accent);
      return;
    }
    const colors = await getAICalendarMoodColors(cal, streak, recentYes);
    if (colors && activeCal === cal) {
      applyCalendarMoodColors(colors.bg, colors.accent);
      try { localStorage.setItem(cacheKey, `${colors.bg}|${colors.accent}`); } catch (e) { /* ignore */ }
    }
  }

  function computeCurrentStreakFor(cal) {
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    let day = today.getDate();
    let streak = 0;
    for (let i = 0; i < 3650; i++) {
      const data = getMonthData(cal, year, month);
      if (!isGoodAnswer(cal, ansOf(data[day]))) break;
      streak++;
      day--;
      if (day < 1) {
        month--;
        if (month < 0) { month = 11; year--; }
        day = new Date(year, month + 1, 0).getDate();
      }
    }
    return streak;
  }

  function fallbackCrossSummary(streakA, streakB) {
    return `Calendar: ${streakA}日連続、Alcohol: ${streakB}日連続。この調子で。`;
  }

  async function getCrossCalendarSummaryText(streakA, streakB) {
    // AI-generated summary text is disabled in this build; a simple
    // locally-computed message is used instead.
    return fallbackCrossSummary(streakA, streakB);
  }

  async function updateCrossCalendarSummary() {
    const crossSummaryEl = document.getElementById('crossSummary');
    const streakA = computeCurrentStreakFor('a');
    const streakB = computeCurrentStreakFor('b');
    const message = await getCrossCalendarSummaryText(streakA, streakB);
    crossSummaryEl.textContent = message;
  }

  function loadMonth(d) {
    monthData = getMonthData(activeCal, d.getFullYear(), d.getMonth());
    render();
    updateStreakBanner();
    updateCrossCalendarSummary();
    updateCalendarMood();
    refreshMemoBubble();
    updateTodayStatusIcon();
    updateMonthBanner();
  }

  function saveMonth(d) {
    const key = monthKey(activeCal, d.getFullYear(), d.getMonth());
    try {
      localStorage.setItem(key, JSON.stringify(monthData));
      scheduleCloudSync();
    } catch (e) {
      console.error('save month failed', e);
    }
  }

  const weatherCache = {};

  function weatherMonthKey(year, month) {
    return `yesno:weather:${year}-${String(month + 1).padStart(2, '0')}`;
  }

  function getWeatherMonthData(year, month) {
    const key = weatherMonthKey(year, month);
    if (weatherCache[key]) return weatherCache[key];
    try {
      const raw = localStorage.getItem(key);
      weatherCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error('load weather month failed', e);
      weatherCache[key] = {};
    }
    return weatherCache[key];
  }

  function saveWeatherMonthData(year, month) {
    const key = weatherMonthKey(year, month);
    try {
      localStorage.setItem(key, JSON.stringify(weatherCache[key] || {}));
      scheduleCloudSync();
    } catch (e) {
      console.error('save weather month failed', e);
    }
  }

  // Weather is shared between calendars: check the shared store first, and
  // fall back to weather embedded on either calendar's own entry (from before
  // weather became shared) so no previously-recorded weather is lost.
  function getWeatherForDay(year, month, day) {
    const shared = getWeatherMonthData(year, month)[day];
    if (shared) return shared;
    const aData = getMonthData('a', year, month);
    const bData = getMonthData('b', year, month);
    return weatherOf(aData[day]) || weatherOf(bData[day]) || '';
  }

  const memoCache = {};

  function memoMonthKey(year, month) {
    return `yesno:memo:${year}-${String(month + 1).padStart(2, '0')}`;
  }

  function getMemoMonthData(year, month) {
    const key = memoMonthKey(year, month);
    if (memoCache[key]) return memoCache[key];
    try {
      const raw = localStorage.getItem(key);
      memoCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      memoCache[key] = {};
    }
    return memoCache[key];
  }

  function saveMemo(year, month, day, text) {
    const data = getMemoMonthData(year, month);
    data[day] = text;
    try {
      localStorage.setItem(memoMonthKey(year, month), JSON.stringify(data));
      scheduleCloudSync();
    } catch (e) {
      console.error('save memo failed', e);
    }
  }

  function getMemo(year, month, day) {
    return getMemoMonthData(year, month)[day] || '';
  }

  function refreshMemoBubble() {
    const bubble = document.getElementById('memoBubble');
    if (!bubble) return;
    const today = new Date();
    const isViewingCurrentMonth = current.getFullYear() === today.getFullYear() && current.getMonth() === today.getMonth();
    const note = isViewingCurrentMonth ? getMemo(today.getFullYear(), today.getMonth(), today.getDate()) : '';
    if (note) {
      bubble.innerHTML = `<span class="memo-bubble-icon">🎤</span>"${escapeHtml(note)}"`;
      bubble.style.display = '';
    } else {
      bubble.style.display = 'none';
    }
  }

  function setupMemoSection(day) {
    const section = document.getElementById('memoSection');
    if (!section) return;

    const existing = getMemo(current.getFullYear(), current.getMonth(), day);
    const existingHtml = existing
      ? `<div class="memo-note"><span class="memo-icon">🎤</span>"${escapeHtml(existing)}"</div>`
      : '';

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      section.innerHTML = existingHtml;
      return;
    }

    section.innerHTML = `
      <button class="memo-btn" id="memoBtn">🎤 メモを話す</button>
      <div class="memo-status" id="memoStatus"></div>
      <div id="memoNoteDisplay">${existingHtml}</div>`;

    const btn = document.getElementById('memoBtn');
    const statusEl = document.getElementById('memoStatus');
    const noteDisplay = document.getElementById('memoNoteDisplay');

    btn.addEventListener('click', () => {
      const recognition = new SpeechRec();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      btn.classList.add('listening');
      btn.textContent = '🎤 聞いています…';
      statusEl.textContent = '';

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        btn.classList.remove('listening');
        btn.textContent = '🎤 メモを話す';
        saveMemo(current.getFullYear(), current.getMonth(), day, transcript);
        noteDisplay.innerHTML = `<div class="memo-note"><span class="memo-icon">🎤</span>"${escapeHtml(transcript)}"</div>`;
        statusEl.textContent = 'メモを保存しました。';
        refreshMemoBubble();
      };
      recognition.onerror = (e) => {
        btn.classList.remove('listening');
        btn.textContent = '🎤 メモを話す';
        const messages = {
          'not-allowed': 'マイクの使用が許可されていません。',
          'network': 'ネットワーク接続が必要です。',
          'no-speech': '声が聞き取れませんでした。',
          'audio-capture': 'マイクが見つかりませんでした。'
        };
        statusEl.textContent = messages[e.error] || `音声を認識できませんでした(${e.error})。`;
      };
      recognition.onend = () => {
        btn.classList.remove('listening');
      };
      recognition.start();
    });
  }

  function isPredicted(entry) {
    return !!(entry && typeof entry === 'object' && entry.p);
  }

  let justConfirmedDay = null;
  let justConfirmedYesDay = null;

  async function setAnswer(day, value, isEditingToday) {
    let justConfirmedNo = false;
    if (value === null) {
      delete monthData[day];
    } else if (isEditingToday && new Date().getHours() < 18) {
      // entered before 6pm: treat as a tentative prediction for the day, not yet final
      monthData[day] = { a: value, p: true };
    } else {
      monthData[day] = { a: value };
      if (isGoodAnswer(activeCal, value)) { justConfirmedDay = String(day); justConfirmedNo = true; }
      else justConfirmedYesDay = String(day);
    }
    await saveMonth(current);
    await render();
    updateStreakBanner();
    updateCrossCalendarSummary();
    updateCalendarMood();
    if (justConfirmedNo && isEditingToday) maybeCelebrateMilestone();
  }

  function setAnswerForCal(cal, day, value, isEditingToday) {
    const data = getMonthData(cal, current.getFullYear(), current.getMonth());
    if (value === null) {
      delete data[day];
    } else if (isEditingToday && new Date().getHours() < 18) {
      data[day] = { a: value, p: true };
    } else {
      data[day] = { a: value };
    }
    const key = monthKey(cal, current.getFullYear(), current.getMonth());
    try {
      localStorage.setItem(key, JSON.stringify(data));
      scheduleCloudSync();
    } catch (e) {
      console.error('save month failed', e);
    }
  }

  function bothCalendarsEmptyToday(day) {
    const aData = getMonthData('a', current.getFullYear(), current.getMonth());
    const bData = getMonthData('b', current.getFullYear(), current.getMonth());
    const cData = getMonthData('c', current.getFullYear(), current.getMonth());
    return !ansOf(aData[day]) && !ansOf(bData[day]) && !ansOf(cData[day]);
  }

  function collectWeekData(cal) {
    const now = new Date();
    const results = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      const data = getMonthData(cal, d.getFullYear(), d.getMonth());
      const entry = data[d.getDate()];
      const w = getWeatherForDay(d.getFullYear(), d.getMonth(), d.getDate());
      results.push({
        date: d.toISOString().slice(0, 10),
        answer: ansOf(entry) || 'none',
        weather: w || 'unknown'
      });
    }
    return results;
  }

  function updateWeeklyInsight() {
    const el = document.getElementById('weeklyInsight');
    if (!el) return;
    // AI-generated reflection is disabled in this build; a simple local
    // stat summary is shown instead (no network call needed).
    const weekA = collectWeekData('a');
    const weekB = collectWeekData('b');
    const noA = weekA.filter(d => d.answer === 'no').length;
    const noB = weekB.filter(d => d.answer === 'no').length;
    const recordedA = weekA.filter(d => d.answer !== 'none').length;
    const recordedB = weekB.filter(d => d.answer !== 'none').length;
    el.textContent = `Calendar: ${noA}/${recordedA} on-track days recorded this week. Alcohol: ${noB}/${recordedB} alcohol-free days recorded this week.`;
  }

  function updateMonthBanner() {
    const el = document.getElementById('monthBanner');
    if (!el) return;
    const arr = MONTH_BANNER_IMAGES[activeCal];
    if (!arr) return;
    const monthIndex = current.getMonth(); // 0-11
    const url = arr[monthIndex];
    if (url) el.style.backgroundImage = `url("${url}")`;
  }

  function updateTodayStatusIcon() {
    const el = document.getElementById('todayStatusIcon');
    if (!el) return;
    const today = new Date();
    const day = today.getDate();
    const cals = ['a', 'b', 'c'];
    let anyPending = false;
    let anyBad = false;
    cals.forEach(cal => {
      const data = getMonthData(cal, today.getFullYear(), today.getMonth());
      const entry = data[day];
      const answer = ansOf(entry);
      if (!answer || isPredicted(entry)) {
        anyPending = true;
      } else if (!isGoodAnswer(cal, answer)) {
        anyBad = true;
      }
    });

    if (anyPending) {
      el.textContent = '⏳';
    } else if (anyBad) {
      el.textContent = '😔';
    } else {
      el.textContent = '🎉';
    }
  }

  const DAILY_CHOICE_MESSAGES = [
    '今日の選択も、これまでの積み重ねの続きです。特別な日である必要はありません。ただ、いつも通りに一つ選ぶだけです。その小さな一つが、また明日につながっていきます。',
    '毎日は続いているようでいて、実は今日という一日は今日しかありません。今この瞬間にどちらを選ぶかは、あなた次第です。急がなくて大丈夫です。',
    '積み重ねというのは、派手な決断ではなく、こういう地味な瞬間の連続でできています。今日もその一つを、静かに選んでください。',
    '昨日までのことは、もう変えられません。でも今日これから何を選ぶかは、まだ自分の手の中にあります。それだけで十分な気がします。',
    '大きな変化は、たいてい小さな選択の積み重ねの先にあります。今日の一つの選択も、その一部です。焦らず、いつも通りでいいので。'
  ];

  async function getDailyChoiceMessage() {
    // AI-generated narrative text is disabled in this build; a small local
    // set of rotating messages is used instead so there is still some
    // variety without needing a network call.
    return DAILY_CHOICE_MESSAGES[Math.floor(Math.random() * DAILY_CHOICE_MESSAGES.length)];
  }

  async function confirmPrediction(day) {
    const entry = monthData[day];
    if (!entry) return;
    const a = ansOf(entry);
    monthData[day] = { a };
    if (isGoodAnswer(activeCal, a)) justConfirmedDay = String(day);
    else justConfirmedYesDay = String(day);
    await saveMonth(current);
    await render();
    updateStreakBanner();
    updateCrossCalendarSummary();
    updateCalendarMood();
    if (isGoodAnswer(activeCal, a)) maybeCelebrateMilestone();
  }

  function setWeather(day, w) {
    const year = current.getFullYear();
    const month = current.getMonth();
    const data = getWeatherMonthData(year, month);
    data[day] = w;
    saveWeatherMonthData(year, month);
    render();
  }

  async function render() {
    const year = current.getFullYear();
    const month = current.getMonth();
    monthLabel.textContent = `${MONTH_NAMES[month]} ${year}`;

    const firstDay = (new Date(year, month, 1).getDay() + 6) % 7; // 0 = Monday, 6 = Sunday
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const today = new Date();

    const prevMonthDate = new Date(year, month - 1, 1);
    const prevDaysInMonth = new Date(prevMonthDate.getFullYear(), prevMonthDate.getMonth() + 1, 0).getDate();
    const prevData = getMonthData(activeCal, prevMonthDate.getFullYear(), prevMonthDate.getMonth());
    let runningStreak = trailingGoodStreak(activeCal, prevData, prevDaysInMonth);

    const nextMonthDate = new Date(year, month + 1, 1);
    const nextData = getMonthData(activeCal, nextMonthDate.getFullYear(), nextMonthDate.getMonth());

    const otherCal = activeCal === 'a' ? 'b' : (activeCal === 'b' ? 'a' : null);
    const otherMonthData = otherCal ? getMonthData(otherCal, year, month) : {};
    const goodAns = goodAnswerFor(activeCal);
    const goodLabel = goodAns === 'yes' ? 'Yes' : 'No';

    let html = '';
    for (let i = 0; i < firstDay; i++) {
      html += '<div class="day-cell empty"></div>';
    }

    let noCount = 0;
    for (let day = 1; day <= daysInMonth; day++) {
      const cellDate = new Date(year, month, day);
      const isToday = isSameDay(cellDate, today);
      const isFuture = cellDate > today && !isToday;
      const entry = monthData[day];
      const answer = ansOf(entry);
      const w = getWeatherForDay(year, month, day);
      const isGood = answer ? isGoodAnswer(activeCal, answer) : false;
      if (isGood) noCount++;

      let dayStreak = 0;
      if (isGood) {
        runningStreak++;
        dayStreak = runningStreak;
      } else {
        runningStreak = 0;
      }

      let classes = 'day-cell';
      if (isToday) classes += ' today';
      if (isFuture) classes += ' future';
      if (!isFuture) classes += ' clickable';

      const holidayName = holidayNameFor(year, month, day);
      const realDow = cellDate.getDay(); // 0 = Sun, 6 = Sat, regardless of Monday-first grid
      if (holidayName || realDow === 0) {
        classes += ' date-sunday-or-holiday';
      } else if (realDow === 6) {
        classes += ' date-saturday';
      }

      const otherAnswer = otherCal ? ansOf(otherMonthData[day]) : null;
      const isOverlapNo = !!otherCal && answer === 'no' && otherAnswer === 'no';
      const isOverlapYes = !!otherCal && answer === 'yes' && otherAnswer === 'yes';

      if (isOverlapYes) {
        classes += ' overlap-yes';
      } else if (isOverlapNo) {
        classes += ' overlap-no';
      } else if (answer === 'yes') {
        classes += ' answer-yes';
      } else if (answer === 'no') {
        classes += ' answer-no';
      }

      if (answer) {
        const dayOfWeek = cellDate.getDay();
        const prevAns = day === 1 ? ansOf(prevData[prevDaysInMonth]) : ansOf(monthData[day - 1]);
        const nextAns = day === daysInMonth ? ansOf(nextData[1]) : ansOf(monthData[day + 1]);
        if (dayOfWeek !== 1 && prevAns === answer) classes += ' chain-left';
        if (dayOfWeek !== 0 && nextAns === answer) classes += ' chain-right';
      }

      let hangoverBridgeRight = false;
      if (activeCal === 'b') {
        if (answer === 'yes') classes += ' hangover-day';
        const prevDayAnswer = day === 1 ? ansOf(prevData[prevDaysInMonth]) : ansOf(monthData[day - 1]);
        if (prevDayAnswer === 'yes') classes += ' hangover-morning';
        if (answer === 'yes' && cellDate.getDay() !== 0) hangoverBridgeRight = true;
      }

      const icon = weatherIcon(w);
      const face = isOverlapYes ? '' : faceIconFor(answer, dayStreak);
      const iconRow = (icon || face)
        ? `<div class="icon-row">${icon ? `<span class="icon-slot">${icon}</span>` : ''}${face ? `<span class="icon-slot">${face}</span>` : ''}</div>`
        : '<div class="icon-row"></div>';

      let mainInner = '';
      const stillPredicted = isToday && isPredicted(entry);
      const overdueToConfirm = stillPredicted && new Date().getHours() >= 18;
      const nudgeHtml = overdueToConfirm ? `<div class="confirm-nudge">Fix?</div>` : '';
      if (answer && !isGood) {
        // the "off-track" answer for this calendar
        if (isOverlapYes) {
          mainInner = `<div class="cry-icon">😭</div>`;
        } else if (stillPredicted) {
          mainInner = `${nudgeHtml}<div class="mark-yes predicted"></div><div class="predicted-label">予測</div>`;
        } else {
          const yesJustConfirmed = String(day) === justConfirmedYesDay;
          if (yesJustConfirmed) justConfirmedYesDay = null; // consume the flag so it only plays once
          if (activeCal === 'b') {
            mainInner = `<div class="mark-yes wine-mark${yesJustConfirmed ? ' wine-tip-anim' : ''}">🍷</div>`;
          } else if (activeCal === 'c') {
            mainInner = `<div class="mark-yes sigh-mark${yesJustConfirmed ? ' sigh-droop-anim' : ''}">😴</div>`;
          } else {
            mainInner = `<div class="mark-yes sigh-mark${yesJustConfirmed ? ' sigh-droop-anim' : ''}">😔</div>`;
          }
        }
      } else if (answer && isGood) {
        // the "on-track" answer for this calendar — gets the escalating streak stamp
        const badge = dayStreak >= 2 ? `<span class="stamp-badge">${dayStreak}</span>` : '';
        const justConfirmed = String(day) === justConfirmedDay;
        if (justConfirmed) justConfirmedDay = null; // consume the flag so it only plays once
        mainInner = stillPredicted
          ? `${nudgeHtml}<div class="stamp predicted">${goodLabel.toUpperCase()}${badge}</div><div class="predicted-label">予測</div>`
          : `<div class="stamp${justConfirmed ? ' stamp-slam' : ''}">${goodLabel.toUpperCase()}${badge}</div>`;
      } else if (isToday) {
        mainInner = `<button class="today-tap" data-day="${day}" data-action="open">👆</button>`;
      }
      // any past/today day with no answer is still tappable to add one; future days are not

      const hangoverBridgeHtml = hangoverBridgeRight ? '<span class="hangover-bridge"></span>' : '';
      const predictedPulseClass = stillPredicted ? ' predicted-pulse' : '';

      const inner = `
        <div class="cell-top">
          <div class="day-num"${holidayName ? ` title="${holidayName}"` : ''}>${day}</div>
          ${iconRow}
        </div>
        <div class="cell-main">${mainInner}</div>
        ${hangoverBridgeHtml}`;

      html += `<div class="${classes}${predictedPulseClass}" ${!isFuture ? `data-day="${day}" data-open-modal="1"` : ''}>${inner}</div>`;
    }

    daysGrid.innerHTML = html;

    daysGrid.querySelectorAll('[data-open-modal]').forEach(cell => {
      cell.addEventListener('click', (e) => {
        // avoid double-trigger when the inner "Answer" button is clicked
        openModal(cell.getAttribute('data-day'));
      });
    });

    summaryEl.innerHTML = noCount > 0
      ? `<b>${noCount}</b> "${goodLabel}" day(s) recorded this month`
      : `No "${goodLabel}" days recorded yet this month`;
  }

  const modalOverlay = document.getElementById('modalOverlay');
  const modalQuestion = document.getElementById('modalQuestion');
  const modalDate = document.getElementById('modalDate');
  const modalBody = document.getElementById('modalBody');
  const modalClose = document.getElementById('modalClose');

  const WEEKDAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function fallbackEncouragement(streak) {
    if (activeCal === 'b') {
      return '記録したよ。また明日から仕切り直そう。';
    }
    return streak >= 2
      ? `That's ${streak} days in a row — tomorrow's a fresh chance to turn it around.`
      : `Noted. Tomorrow's a new day.`;
  }

  async function getEncouragement(streak, question) {
    // AI-generated encouragement is disabled in this build; the local
    // fallback message is used instead.
    return fallbackEncouragement(streak);
  }

  async function showEncouragement() {
    const isCalB = activeCal === 'b';
    modalQuestion.textContent = isCalB ? '少々お待ちください…' : 'One moment…';
    modalDate.textContent = '';
    modalBody.innerHTML = `<div class="modal-status">${isCalB ? '励ましの言葉を考えています…' : 'Thinking of something encouraging…'}</div>`;

    const streak = await computeCurrentStreak();
    const message = await getEncouragement(streak, questionEl.textContent.trim());

    if (isCalB) {
      modalQuestion.textContent = 'Yesと記録しました';
    } else {
      modalQuestion.textContent = streak >= 2 ? `${streak}-day streak` : 'Logged as No';
    }
    modalBody.innerHTML = `
      <div class="modal-status" style="font-style:italic;">${escapeHtml(message)}</div>
      <div class="modal-buttons">
        <button class="modal-clear" data-action="ok">OK</button>
      </div>`;
    modalBody.querySelector('button[data-action="ok"]').addEventListener('click', closeModal);
  }

  function weatherCategoryFromCode(code) {
    if (code === 0 || code === 1) return 'sunny';
    if (code === 2 || code === 3 || code === 45 || code === 48) return 'cloudy';
    return 'rainy'; // drizzle, rain, showers, snow, thunderstorm all bucket here
  }

  // Fixed home location, since geolocation permission prompts are unreliable
  // when this app is opened as a local file (file://) rather than https.
  const HOME_LOCATION = { lat: 34.7617, lon: 135.5167 }; // Suita City, Osaka

  async function getCoords() {
    const geo = await new Promise((resolve) => {
      try {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 3000 }
        );
      } catch (e) {
        resolve(null);
      }
    });
    if (geo) return geo;
    // fall back to the fixed home location instead of IP lookup
    return HOME_LOCATION;
  }

  async function tryAutoWeather(day) {
    try {
      const coords = await getCoords();
      if (!coords) return false;
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current_weather=true`);
      const data = await res.json();
      const code = data && data.current_weather ? data.current_weather.weathercode : null;
      if (code === null || code === undefined) return false;
      await setWeather(day, weatherCategoryFromCode(code));
      return true;
    } catch (e) {
      // Expected failure path (network/geolocation blocked) — falls back to the manual picker silently.
      return false;
    }
  }

  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return null;
      audioCtx = new Ctor();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playNote(ctx, freq, startTime, duration, type, gainPeak) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  }

  function jitterHz() {
    return (Math.random() * 10 - 5);
  }

  function playFeedbackSound(answerValue, isPrediction, calOverride) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    try {
      const now = ctx.currentTime + 0.02;
      const cal = calOverride || activeCal;
      const good = isGoodAnswer(cal, answerValue);

      if (cal === 'b' && good) {
        // Alcohol, "No" (didn't drink) — bright cork-pop + fizz, upbeat
        const base = 900 + jitterHz() * 4;
        playNote(ctx, base, now, 0.12, 'sine', isPrediction ? 0.12 : 0.22);
        playNote(ctx, base * 1.4 + jitterHz(), now + 0.06, 0.14, 'triangle', isPrediction ? 0.09 : 0.16);
        if (!isPrediction) playNote(ctx, base * 1.8 + jitterHz(), now + 0.13, 0.22, 'sine', 0.1);
      } else if (cal === 'b' && !good) {
        // Alcohol, "Yes" (drank) — low wobbly "glug glug", a bit deflated
        const notes = isPrediction ? [220, 190] : [240, 210, 180, 150];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.17, 0.2, 'sine', isPrediction ? 0.1 : 0.18);
        });
      } else if (good) {
        // Calendar/Exercise, on-track answer — upbeat ascending fanfare ("パッパラパッパ")
        const notes = isPrediction ? [523, 659] : [523, 659, 784, 1046];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.11, 0.16, 'triangle', isPrediction ? 0.12 : 0.2);
        });
      } else {
        // Calendar/Exercise, off-track answer — droopy descending "sad trombone" ("フンフンフン")
        const notes = isPrediction ? [300, 260] : [330, 294, 262, 220];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.19, 0.24, 'sawtooth', isPrediction ? 0.1 : 0.18);
        });
      }
    } catch (e) {
      console.error('sound playback failed', e);
    }
  }

  const CLOUD_CONFIG_KEY = 'yesno:cloud-config';
  const CLOUD_LAST_SYNC_KEY = 'yesno:cloud-last-sync';

  function getCloudConfig() {
    try {
      const raw = localStorage.getItem(CLOUD_CONFIG_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  // The cloud-stored calendar data is encrypted (AES-GCM) using a key derived
  // from the Bin ID + API Key, so anyone who only sees the raw bin content
  // sees ciphertext, not readable Yes/No records. No extra setup step needed.
  async function getCloudCryptoKey() {
    const config = getCloudConfig();
    if (!config || !window.crypto || !window.crypto.subtle) return null;
    const keyMaterial = await window.crypto.subtle.digest(
      'SHA-256',
      new TextEncoder().encode(`${config.binId}:${config.apiKey}`)
    );
    return window.crypto.subtle.importKey('raw', keyMaterial, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
  }

  function bufToBase64(buf) {
    let binary = '';
    const bytes = new Uint8Array(buf);
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  function base64ToBuf(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function encryptForCloud(obj) {
    const key = await getCloudCryptoKey();
    if (!key) return null;
    const iv = window.crypto.getRandomValues(new Uint8Array(12));
    const encoded = new TextEncoder().encode(JSON.stringify(obj));
    const ciphertext = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
    return { iv: bufToBase64(iv), ct: bufToBase64(ciphertext) };
  }

  async function decryptFromCloud(enc) {
    const key = await getCloudCryptoKey();
    if (!key || !enc || !enc.iv || !enc.ct) return null;
    try {
      const iv = base64ToBuf(enc.iv);
      const data = base64ToBuf(enc.ct);
      const plainBuf = await window.crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      return JSON.parse(new TextDecoder().decode(plainBuf));
    } catch (e) {
      console.error('cloud decrypt failed', e);
      return null;
    }
  }

  function setupCloudSync() {
    const existing = getCloudConfig();
    const input = prompt(
      'jsonbin.io の Bin ID と API Key を「,」区切りで貼り付けてください。\n例: 65abc1234,$2a$10$xxxxxxxxxxxxxxxxxxxxxxxx\n\n両方の端末・バージョンで同じBin IDとAPI Keyを設定すると、記録が自動で共有されます。',
      existing ? `${existing.binId},${existing.apiKey}` : ''
    );
    if (input === null) return;
    const parts = input.split(',').map(s => s.trim());
    if (parts.length !== 2 || !parts[0] || !parts[1]) {
      alert('Bin IDとAPI Keyの両方を、カンマ区切りで入力してください。');
      return;
    }
    try {
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify({ binId: parts[0], apiKey: parts[1] }));
    } catch (e) {
      console.error('save cloud config failed', e);
    }
    alert('クラウド同期を設定しました。');
    syncFromCloud();
  }

  function collectAllSyncableData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('yesno:') && key !== CLOUD_CONFIG_KEY && key !== CLOUD_LAST_SYNC_KEY) {
        data[key] = localStorage.getItem(key);
      }
    }
    return data;
  }

  async function syncToCloud() {
    const config = getCloudConfig();
    if (!config) return;
    try {
      const updatedAt = Date.now();
      const encrypted = await encryptForCloud(collectAllSyncableData());
      if (!encrypted) {
        console.error('cloud sync (upload) skipped: encryption unavailable (window.crypto.subtle missing)');
        return;
      }
      const payload = { updatedAt, enc: encrypted };
      const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': config.apiKey
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        console.error('cloud sync (upload) failed:', res.status, body);
        return;
      }
      localStorage.setItem(CLOUD_LAST_SYNC_KEY, String(updatedAt));
    } catch (e) {
      console.error('cloud sync (upload) failed', e);
    }
  }

  let cloudSyncTimer = null;
  function scheduleCloudSync() {
    if (!getCloudConfig()) return;
    clearTimeout(cloudSyncTimer);
    cloudSyncTimer = setTimeout(syncToCloud, 800);
  }

  async function syncFromCloud() {
    const config = getCloudConfig();
    if (!config) return;
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${config.binId}/latest`, {
        headers: { 'X-Master-Key': config.apiKey }
      });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        console.error('cloud sync (download) failed:', res.status, body);
        return;
      }
      const json = await res.json();
      const remote = json && json.record;
      if (!remote) return;

      // Support both the new encrypted format and old plaintext bins from
      // before encryption was added.
      const remoteData = remote.enc ? await decryptFromCloud(remote.enc) : remote.data;
      if (!remoteData) {
        console.error('cloud sync (download) failed: could not decrypt remote data');
        return;
      }

      const localTimestamp = Number(localStorage.getItem(CLOUD_LAST_SYNC_KEY) || 0);
      if (remote.updatedAt > localTimestamp) {
        Object.keys(remoteData).forEach(key => {
          localStorage.setItem(key, remoteData[key]);
        });
        localStorage.setItem(CLOUD_LAST_SYNC_KEY, String(remote.updatedAt));
        Object.keys(monthCache).forEach(k => delete monthCache[k]);
        Object.keys(weatherCache).forEach(k => delete weatherCache[k]);
        Object.keys(memoCache).forEach(k => delete memoCache[k]);
        loadQuestion();
        loadMonth(current);
      }
    } catch (e) {
      console.error('cloud sync (download) failed', e);
    }
  }

  function collectBackupData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('yesno:')) {
        data[key] = localStorage.getItem(key);
      }
    }
    return data;
  }

  async function backupAndShare() {
    let json, filename, file;
    try {
      const data = collectBackupData();
      json = JSON.stringify(data, null, 2);
      const dateStr = new Date().toISOString().slice(0, 10);
      filename = `yesno-calendar-backup-${dateStr}.json`;
      file = new File([json], filename, { type: 'application/json' });
    } catch (e) {
      console.error('backup file creation failed', e);
      alert('Could not create the backup file.');
      return;
    }

    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: 'Yes/No Calendar Backup',
          text: 'Backup of your Yes/No Calendar data. Save this somewhere safe, like Google Drive.'
        });
        return;
      }
    } catch (e) {
      if (e && e.name === 'AbortError') return; // user cancelled the share sheet
      console.error('share failed, falling back to download', e);
      // fall through to the plain download below
    }

    try {
      const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      alert('Sharing isn\'t available here, so the backup file was downloaded instead. You can upload it to Google Drive manually from your Downloads.');
    } catch (e) {
      console.error('download fallback failed', e);
      alert('Could not create the backup file.');
    }
  }

  function restoreFromFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(String(reader.result || '{}'));
        let count = 0;
        Object.keys(data).forEach(key => {
          if (key.startsWith('yesno:')) {
            localStorage.setItem(key, data[key]);
            count++;
          }
        });
        // clear in-memory caches so the restored data is picked up
        Object.keys(monthCache).forEach(k => delete monthCache[k]);
        Object.keys(weatherCache).forEach(k => delete weatherCache[k]);
        Object.keys(memoCache).forEach(k => delete memoCache[k]);
        loadQuestion();
        loadMonth(current);
        alert(`Restored ${count} record(s) from backup.`);
      } catch (e) {
        console.error('restore failed', e);
        alert('That file doesn\'t look like a valid backup.');
      }
    };
    reader.onerror = () => alert('Could not read that file.');
    reader.readAsText(file);
  }

  document.getElementById('backupShareBtn').addEventListener('click', backupAndShare);
  document.getElementById('cloudSyncBtn').addEventListener('click', setupCloudSync);
  document.getElementById('forceSyncBtn').addEventListener('click', async () => {
    const btn = document.getElementById('forceSyncBtn');
    btn.textContent = '🔄 Syncing…';
    await syncFromCloud();
    btn.textContent = '🔄 Sync Now';
  });

  // Pull the latest data whenever the user returns to this tab/app, so
  // switching between devices doesn't require a full page reload.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') syncFromCloud();
  });
  window.addEventListener('focus', () => syncFromCloud());
  document.getElementById('restoreBtn').addEventListener('click', () => {
    document.getElementById('restoreFileInput').click();
  });
  document.getElementById('restoreFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) restoreFromFile(file);
    e.target.value = '';
  });

  (async function init() {
    document.body.classList.toggle('theme-b', activeCal === 'b');
    document.body.classList.toggle('theme-c', activeCal === 'c');
    await loadQuestion();
    await loadMonth(current);
    updateCrossCalendarSummary();
    updateCalendarMood();
    updateWeeklyInsight();
    syncFromCloud();
  })();
</script>
</body>
</html>
