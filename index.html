<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yes/No Calendar</title>

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='28' fill='%23223A5E'/%3E%3Ccircle cx='96' cy='96' r='58' fill='none' stroke='%23C23C2F' stroke-width='7'/%3E%3Ccircle cx='96' cy='96' r='47' fill='none' stroke='%23C23C2F' stroke-width='3' opacity='0.6'/%3E%3Ctext x='96' y='108' font-family='Georgia, serif' font-weight='700' font-size='38' fill='%23C23C2F' text-anchor='middle'%3ENO%3C/text%3E%3C/svg%3E">

<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Yes%2FNo%20Calendar%22%2C%22short_name%22%3A%22Yes%2FNo%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23efe9da%22%2C%22theme_color%22%3A%22%23223A5E%22%7D">

<style>
  :root {
    --paper: #efe9da;
    --ink: #2b2b28;
    --ink-soft: #6b6558;
    --indigo: #223a5e;
    --indigo-soft: #3d5578;
    --vermillion: #c23c2f;
    --line: #cfc6ac;
    --dot-color: rgba(43,43,40,0.05);
    --indigo-soft-rgb: 61, 85, 120;
    --vermillion-rgb: 194, 60, 47;
    --overlap-rgb: 180, 130, 20;
    --overlap-yes-rgb: 60, 55, 55;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body.theme-b {
    --paper: #eef6ee;
    --ink: #24352a;
    --ink-soft: #5d7869;
    --indigo: #2f7d5c;
    --indigo-soft: #4f9c78;
    --vermillion: #d98a4f;
    --line: #c3ddc9;
    --dot-color: rgba(47, 125, 92, 0.06);
    --indigo-soft-rgb: 79, 156, 120;
    --vermillion-rgb: 217, 138, 79;
    --overlap-rgb: 90, 150, 200;
    --overlap-yes-rgb: 180, 150, 90;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, var(--dot-color) 1px, transparent 0);
    background-size: 18px 18px;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 14px 16px 30px;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 10px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    margin-bottom: 3px;
  }

  .question {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.35;
    color: var(--indigo);
    padding: 3px 8px;
    border-bottom: 1px dashed var(--line);
    display: inline-block;
    min-width: 60%;
    outline: none;
    cursor: text;
  }
  .question:focus { border-bottom-color: var(--indigo); }
  .question-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0 8px;
  }
  .nav button {
    background: none;
    border: 1px solid var(--indigo);
    color: var(--indigo);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav button:hover { background: var(--indigo); color: var(--paper); }
  .nav .month-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .grid-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 10px 12px;
    box-shadow: 0 1px 0 rgba(43,43,40,0.04);
  }

  .weekdays, .days {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }
  .weekdays {
    margin-bottom: 8px;
  }
  .weekdays div {
    text-align: center;
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }
  .weekdays div:nth-last-child(2) { color: var(--indigo-soft); }
  .weekdays div:last-child { color: var(--vermillion); }

  .days {
    grid-auto-rows: 70px;
  }

  .day-cell {
    position: relative;
    height: 70px;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    font-size: 13px;
    background: rgba(255,255,255,0.35);
    border: 1px solid transparent;
    overflow: visible;
    padding: 3px 4px;
  }
  .day-cell.empty { background: none; }
  .day-cell.today {
    border-color: transparent;
  }
  @property --ring-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  .day-cell.today::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 6px;
    padding: 3px;
    background: conic-gradient(from var(--ring-angle), #ffd1e8, #ff5fa8, #ffb6dd, #ff2f92, #ffd1e8);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: 2;
    animation: spin-today-ring 3s linear infinite;
  }

  @keyframes spin-today-ring {
    from { --ring-angle: 0deg; }
    to   { --ring-angle: 360deg; }
  }
  .day-cell.future { opacity: 0.35; }

  .cell-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    min-height: 12px;
  }

  .day-num {
    font-size: 10px;
    line-height: 1;
    color: var(--ink-soft);
  }

  .icon-row {
    display: flex;
    align-items: center;
    gap: 1px;
    height: 14px;
  }
  .icon-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 13px;
    height: 13px;
    font-size: 10px;
    line-height: 1;
    overflow: visible;
  }

  .cell-main {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .cell-top, .cell-main {
    position: relative;
    z-index: 1;
  }

  .day-cell.answer-yes {
    background: rgba(var(--indigo-soft-rgb), 0.32);
  }
  .day-cell.answer-no {
    background: rgba(var(--vermillion-rgb), 0.28);
  }

  .day-cell.overlap-no {
    background: rgba(var(--overlap-rgb), 0.38);
  }

  .day-cell.overlap-yes {
    background: rgba(var(--overlap-yes-rgb), 0.30);
  }

  .cry-icon {
    font-size: 32px;
    line-height: 1;
  }

  .mark-yes.predicted {
    border-style: dashed;
    opacity: 0.6;
  }
  .stamp.predicted {
    border-style: dashed;
    opacity: 0.6;
    box-shadow: none;
  }
  .predicted-label {
    font-size: 8px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .confirm-nudge {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--vermillion);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 3;
    animation: nudge-blink 1s steps(1) infinite;
  }
  .confirm-nudge::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--vermillion);
  }
  @keyframes nudge-blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  .day-cell.date-saturday .day-num {
    color: var(--indigo-soft);
    font-weight: 700;
  }
  .day-cell.date-sunday-or-holiday .day-num {
    color: var(--vermillion);
    font-weight: 700;
  }

  .day-cell.chain-left {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }
  .day-cell.chain-right {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }

  .day-cell.chain-left::before,
  .day-cell.chain-right::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    z-index: 0;
  }
  .day-cell.chain-left::before { left: -6px; }
  .day-cell.chain-right::after { right: -6px; }

  .day-cell.answer-yes.chain-left::before,
  .day-cell.answer-yes.chain-right::after {
    background: rgba(var(--indigo-soft-rgb), 0.32);
  }
  .day-cell.answer-no.chain-left::before,
  .day-cell.answer-no.chain-right::after {
    background: rgba(var(--vermillion-rgb), 0.28);
  }

  .day-cell.overlap-no.chain-left::before,
  .day-cell.overlap-no.chain-right::after {
    background: rgba(var(--overlap-rgb), 0.38);
  }

  .day-cell.overlap-yes.chain-left::before,
  .day-cell.overlap-yes.chain-right::after {
    background: rgba(var(--overlap-yes-rgb), 0.30);
  }

  .btn-pair {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 10px;
    width: 100%;
    align-items: center;
  }
  .btn-pair button {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: var(--font-body);
    width: 44px;
  }
  .btn-pair button.yes:hover { border-color: var(--indigo); color: var(--indigo); }
  .btn-pair button.no:hover { border-color: var(--vermillion); color: var(--vermillion); }

  .mark-yes {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--indigo-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
  }

  .sigh-mark {
    transform: rotate(6deg);
  }
  @keyframes sigh-droop {
    0%   { transform: translateY(-8px) rotate(0deg) scale(1.2); opacity: 0; }
    35%  { opacity: 1; }
    70%  { transform: translateY(2px) rotate(8deg) scale(0.95); }
    100% { transform: translateY(0) rotate(6deg) scale(1); opacity: 1; }
  }
  .sigh-droop-anim {
    animation: sigh-droop 0.9s cubic-bezier(0.4, 0, 0.6, 1);
  }

  .wine-mark {
    transform-origin: 65% 85%;
  }
  @keyframes wine-tip {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-12deg) scale(1.05); }
    50%  { transform: rotate(35deg) scale(1.1); }
    70%  { transform: rotate(22deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .wine-tip-anim {
    animation: wine-tip 0.8s ease-in-out;
    transform-origin: 65% 85%;
  }

  .stamp {
    width: 34px;
    height: 34px;
    border: 2px solid var(--vermillion);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--vermillion);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.03em;
    position: relative;
    transform: rotate(-8deg);
    box-shadow: 0 0 0 1px rgba(194,60,47,0.15) inset;
    overflow: visible;
  }
  .stamp::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--vermillion);
    border-radius: 50%;
    opacity: 0.6;
  }

  .stamp.stamp-slam {
    animation: stamp-slam 0.45s cubic-bezier(0.2, 0.9, 0.4, 1);
  }
  @keyframes stamp-slam {
    0%   { transform: scale(2.4) rotate(-8deg); opacity: 0; }
    55%  { transform: scale(0.85) rotate(-8deg); opacity: 1; }
    75%  { transform: scale(1.08) rotate(-8deg); }
    100% { transform: scale(1) rotate(-8deg); }
  }

  .clear-btn {
    position: absolute;
    bottom: 2px;
    font-size: 9px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    opacity: 0.5;
  }
  .clear-btn:hover { opacity: 1; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px 18px;
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot-yes {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid var(--indigo-soft);
  }
  .legend .dot-no {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid var(--vermillion);
  }
  .legend .dot-overlap {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(var(--overlap-rgb), 0.6);
    border: 1.5px solid rgba(var(--overlap-rgb), 0.9);
  }

  .summary {
    text-align: center;
    margin-top: 26px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .summary b { color: var(--vermillion); font-size: 15px; }

  .loading {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-soft);
    padding: 40px 0;
    font-size: 13px;
  }

  .today-tap {
    font-size: 18px;
    width: 30px;
    height: 30px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid var(--indigo);
    background: var(--indigo);
    color: var(--paper);
    cursor: pointer;
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    animation: tap-pulse 1.4s ease-in-out infinite;
  }
  @keyframes tap-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(var(--indigo-soft-rgb), 0.5); }
    50% { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(var(--indigo-soft-rgb), 0); }
  }

  .day-cell.clickable {
    cursor: pointer;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,14,0.5);
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal-box {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 30px 26px 24px;
    max-width: 300px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 40px rgba(20,18,14,0.28);
  }
  .modal-question {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 19px;
    color: var(--indigo);
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .modal-date {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }
  .modal-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal-buttons button {
    padding: 15px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    border: none;
  }
  .modal-yes {
    background: var(--indigo);
    color: white;
  }
  .modal-no {
    background: white;
    border: 2px solid var(--vermillion) !important;
    color: var(--vermillion);
  }
  .modal-status {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 16px;
  }
  .modal-clear {
    background: none;
    border: 1px solid var(--line) !important;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 10px !important;
  }
  .modal-close {
    display: block;
    margin: 16px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }

  .streak-banner {
    text-align: center;
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--vermillion);
    font-weight: 600;
    letter-spacing: 0.02em;
    min-height: 0;
  }

  .cross-summary {
    text-align: center;
    margin: 0 0 10px;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .stamp-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--vermillion);
    color: white;
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 700;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--paper);
  }  .weather-picker {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .weather-picker button {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 22px;
    padding: 12px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    width: 78px;
  }
  .weather-picker button span {
    font-size: 11px;
    font-family: var(--font-body);
    color: var(--ink-soft);
  }
  .weather-picker button:hover {
    border-color: var(--indigo);
  }
  .cal-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .cal-tab {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.5);
    color: var(--ink-soft);
    cursor: pointer;
    font-family: var(--font-body);
  }
  .cal-tab.active {
    background: var(--indigo);
    border-color: var(--indigo);
    color: var(--paper);
    font-weight: 600;
  }
  .backup-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-top: 16px;
  }
  .backup-row button {
    background: none;
    border: none;
    color: var(--indigo-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .voice-input-btn {
    display: block;
    margin: 6px auto 0;
    padding: 8px 16px;
    border-radius: 16px;
    border: 1px solid var(--indigo);
    background: var(--paper);
    color: var(--indigo);
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
  }
  .voice-input-btn.listening {
    background: var(--indigo);
    color: var(--paper);
    animation: mic-pulse 1s ease-in-out infinite;
  }

  .voice-bubble {
    position: relative;
    max-width: 90%;
    margin: 0 auto 14px;
    background: var(--paper);
    border: 1px solid var(--indigo-soft);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 12.5px;
    color: var(--ink);
    text-align: center;
    font-style: italic;
  }
  .voice-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: var(--indigo-soft);
  }
  .voice-bubble .voice-icon {
    font-style: normal;
    margin-right: 4px;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(var(--indigo-soft-rgb), 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(var(--indigo-soft-rgb), 0); }
  }

  .combo-row {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .combo-row:first-of-type {
    border-top: none;
    margin-top: 10px;
    padding-top: 0;
  }
  .combo-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .combo-buttons {
    gap: 8px !important;
  }
  .combo-buttons button {
    padding: 10px !important;
    font-size: 14px !important;
  }
  .celebration-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -30px;
    animation-name: petal-fall;
    animation-timing-function: ease-in;
    animation-fill-mode: forwards;
  }
  @keyframes petal-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(112vh) rotate(360deg); opacity: 0.15; }
  }
  .firework {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffdf7e, #ff5fa8, transparent 70%);
    animation: firework-pop 1.2s ease-out forwards;
  }
  @keyframes firework-pop {
    0%   { transform: scale(0); opacity: 1; }
    60%  { transform: scale(9); opacity: 0.8; }
    100% { transform: scale(15); opacity: 0; }
  }
</style>

<body>
<div class="wrap">
  <div class="cal-tabs">
    <button class="cal-tab active" data-cal="a">Calendar</button>
    <button class="cal-tab" data-cal="b">Alcohol</button>
  </div>

  <div class="header">
    <div class="eyebrow">DAILY CHECK-IN</div>
    <div class="question" id="question" contenteditable="true">Did you do it today?</div>
    <div class="question-hint">Tap to edit the question</div>
  </div>

  <div class="streak-banner" id="streakBanner"></div>
  <div class="cross-summary" id="crossSummary"></div>

  <div class="nav">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel">—</div>
    <button id="nextMonth">›</button>
  </div>

  <div class="voice-bubble" id="voiceBubble" style="display:none;"></div>

  <div class="grid-card">
    <div class="weekdays">
      <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>

      <div class="loading">Loading…</div>
    </div>

    <span><span class="dot-no"></span>No (recorded)</span>

    <span>🙂→😍✨ keeps getting happier the longer your No streak runs</span>
    <span><span class="dot-overlap"></span>No on both calendars</span>
    <span>😭 Yes on both calendars</span>
  </div>


  <div class="summary" id="summary"></div>

  <div class="backup-row">
    <button id="backupShareBtn" class="cal-sync-link">📤 Backup &amp; Share</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">

    <div class="modal-date" id="modalDate">—</div>
    <div id="modalBody"></div>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>


<script>
  const daysGrid = document.getElementById('daysGrid');
  const monthLabel = document.getElementById('monthLabel');
  const questionEl = document.getElementById('question');
  const summaryEl = document.getElementById('summary');

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Japanese national holidays 2025-2027, per Cabinet Office (naikakufu) announcements.
  const HOLIDAYS_JP = {
    '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日','2025-02-23':'天皇誕生日',
    '2025-02-24':'休日','2025-03-20':'春分の日','2025-04-29':'昭和の日','2025-05-03':'憲法記念日',
    '2025-05-04':'みどりの日','2025-05-05':'こどもの日','2025-05-06':'休日','2025-07-21':'海の日',
    '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日','2025-10-13':'スポーツの日',
    '2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2025-11-24':'休日',
    '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日',
    '2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日','2026-05-04':'みどりの日',
    '2026-05-05':'こどもの日','2026-05-06':'休日','2026-07-20':'海の日','2026-08-11':'山の日',
    '2026-09-21':'敬老の日','2026-09-22':'休日','2026-09-23':'秋分の日','2026-10-12':'スポーツの日',
    '2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
    '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日','2027-02-23':'天皇誕生日',
    '2027-03-21':'春分の日','2027-03-22':'休日','2027-04-29':'昭和の日','2027-05-03':'憲法記念日',
    '2027-05-04':'みどりの日','2027-05-05':'こどもの日','2027-07-19':'海の日','2027-08-11':'山の日',
    '2027-09-20':'敬老の日','2027-09-23':'秋分の日','2027-10-11':'スポーツの日','2027-11-03':'文化の日',
    '2027-11-23':'勤労感謝の日'
  };

  function holidayKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function holidayNameFor(year, month, day) {
    return HOLIDAYS_JP[holidayKey(year, month, day)] || '';
  }

  let current = new Date();
  current.setDate(1);
  let monthData = {}; // { "1": {a:"yes"|"no", w:"sunny"|"cloudy"|"rainy"}, ... } (or legacy plain string)

  function ansOf(entry) {
    if (!entry) return undefined;
    return typeof entry === 'string' ? entry : entry.a;
  }
  function weatherOf(entry) {
    return (entry && typeof entry === 'object') ? entry.w : undefined;
  }
  function weatherIcon(w) {
    if (w === 'sunny') return '☀️';
    if (w === 'cloudy') return '☁️';
    if (w === 'rainy') return '🌧️';
    return '';
  }
  const HAPPY_STAGES = ['🙂', '😊', '😄', '😁', '🤩', '🥳', '🤪', '😍'];
  const STAGE_WIDTH = 3; // days per stage before moving to a happier face

  const moodIconCache = {};
  const moodIconRequested = {};

  function getCachedMoodIcon(streak) {
    if (moodIconCache[streak]) return moodIconCache[streak];
    try {
      const v = localStorage.getItem(`yesno:mood-icon:${streak}`);
      if (v) {
        moodIconCache[streak] = v;
        return v;
      }
    } catch (e) { /* ignore */ }
    return null;
  }

  async function getAIMoodIcon(streak) {
    const prompt = `You are designing a tiny mood icon for a habit-tracking calendar app. A user has kept a positive streak going for ${streak} day(s) in a row. Reply with ONLY 1 to 3 emoji characters — no words, no explanation — that best capture how happy or proud someone should feel at exactly day ${streak} of a positive streak. A longer streak should generally feel more joyful or triumphant than a shorter one, but be creative and vary your choices meaningfully rather than defaulting to the most obvious happy faces every time.`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 20,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join('')
        .trim();
      return text || null;
    } catch (e) {
      return null;
    }
  }

  function requestMoodIcon(streak) {
    if (moodIconRequested[streak]) return;
    moodIconRequested[streak] = true;
    getAIMoodIcon(streak).then(icon => {
      if (icon) {
        moodIconCache[streak] = icon;
        try { localStorage.setItem(`yesno:mood-icon:${streak}`, icon); } catch (e) { /* ignore */ }
        render();
      }
    });
  }

  function faceIconFor(answer, streak) {
    if (answer === 'yes') return '😕';
    if (answer === 'no' && streak >= 1) {
      if (activeCal === 'a') {
        const aiIcon = getCachedMoodIcon(streak);
        if (aiIcon) return aiIcon;
        requestMoodIcon(streak); // fetches in the background; falls back to the table below meanwhile
      }
      const maxStageIndex = HAPPY_STAGES.length - 1;
      const stageIndex = Math.min(Math.floor((streak - 1) / STAGE_WIDTH), maxStageIndex);
      let icon = HAPPY_STAGES[stageIndex];
      if (stageIndex === maxStageIndex) {
        // once at the happiest face, keep escalating with extra sparkle for every few more days
        const daysAtMaxStage = streak - (maxStageIndex * STAGE_WIDTH + 1);
        const extraSparkles = Math.floor(daysAtMaxStage / 5) + 1;
        icon += '✨'.repeat(extraSparkles);
      }
      return icon;
    }
    return '';
  }

  let activeCal = 'a';

  function questionKey(cal) {
    return cal === 'a' ? 'yesno:question' : `yesno:${cal}:question`;
  }

  function getQuestionText(cal) {
    try {
      const v = localStorage.getItem(questionKey(cal));
      if (v) return v;
    } catch (e) { /* ignore */ }
    return cal === 'a' ? 'Did you do it today?' : 'Did you drink today?';
  }

  function isSameDay(a, b) {
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function loadQuestion() {
    try {
      const val = localStorage.getItem(questionKey(activeCal));
      questionEl.textContent = val || (activeCal === 'a' ? 'Did you do it today?' : 'Did you drink today?');
    } catch (e) { console.error('load question failed', e); }
  }

  function saveQuestion() {
    try {
      localStorage.setItem(questionKey(activeCal), questionEl.textContent.trim());
    } catch (e) {
      console.error('save question failed', e);
    }
  }

  const streakBanner = document.getElementById('streakBanner');
  const monthCache = {};

  function monthKey(cal, year, month) {
    const suffix = `${year}-${String(month + 1).padStart(2, '0')}`;
    return cal === 'a' ? `yesno:${suffix}` : `yesno:${cal}:${suffix}`;
  }

  function getMonthData(cal, year, month) {
    const key = monthKey(cal, year, month);
    if (monthCache[key]) return monthCache[key];
    try {
      const raw = localStorage.getItem(key);
      monthCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error('load month failed', e);
      monthCache[key] = {};
    }
    return monthCache[key];
  }

  function trailingNoStreak(data, daysInMonth) {
    let streak = 0;
    for (let d = daysInMonth; d >= 1; d--) {
      if (ansOf(data[d]) === 'no') streak++;
      else break;
    }
    return streak;
  }

  function computeCurrentStreak() {
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    let day = today.getDate();
    let streak = 0;
    for (let i = 0; i < 3650; i++) {
      const data = getMonthData(activeCal, year, month);
      if (ansOf(data[day]) !== 'no') break;
      streak++;
      day--;
      if (day < 1) {
        month--;
        if (month < 0) { month = 11; year--; }
        day = new Date(year, month + 1, 0).getDate();
      }
    }
    return streak;
  }

  function updateStreakBanner() {
    const streak = computeCurrentStreak();
    streakBanner.textContent = streak >= 2 ? `🔥 ${streak}-day "No" streak` : '';
  }

  function triggerCelebration(intensity) {
    const overlay = document.createElement('div');
    overlay.className = 'celebration-overlay';
    document.body.appendChild(overlay);

    const petalCount = Math.min(70, 18 + intensity * 2);
    const emojis = ['🌸', '🌺', '✨'];
    for (let i = 0; i < petalCount; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      petal.style.left = (Math.random() * 100) + 'vw';
      petal.style.animationDuration = (2.2 + Math.random() * 2.2) + 's';
      petal.style.animationDelay = (Math.random() * 0.9) + 's';
      petal.style.fontSize = (14 + Math.random() * 16) + 'px';
      overlay.appendChild(petal);
    }

    if (intensity >= 20) {
      const fireworkCount = Math.min(8, Math.floor(intensity / 10));
      for (let i = 0; i < fireworkCount; i++) {
        const fw = document.createElement('div');
        fw.className = 'firework';
        fw.style.left = (10 + Math.random() * 80) + 'vw';
        fw.style.top = (8 + Math.random() * 40) + 'vh';
        fw.style.animationDelay = (Math.random() * 1.6) + 's';
        overlay.appendChild(fw);
      }
    }

    setTimeout(() => overlay.remove(), 4800);
  }

  function maybeCelebrateMilestone() {
    const streakA = computeCurrentStreakFor('a');
    const streakB = computeCurrentStreakFor('b');
    const bothRunning = streakA > 0 && streakB > 0;
    const hitMilestone = (streakA % 10 === 0) || (streakB % 10 === 0);
    if (bothRunning && hitMilestone) {
      triggerCelebration(Math.max(streakA, streakB));
    }
  }

  function countRecentYes(cal, days) {
    const today = new Date();
    let count = 0;
    for (let i = 0; i < days; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const data = getMonthData(cal, d.getFullYear(), d.getMonth());
      if (ansOf(data[d.getDate()]) === 'yes') count++;
    }
    return count;
  }

  function applyCalendarMoodColors(bg, accent) {
    document.body.style.setProperty('--paper', bg);
    document.body.style.setProperty('--indigo', accent);
  }

  function resetCalendarMoodColors() {
    document.body.style.removeProperty('--paper');
    document.body.style.removeProperty('--indigo');
  }

  async function getAICalendarMoodColors(cal, streak, recentYes) {
    const label = cal === 'b' ? 'an alcohol-free-day tracker' : 'a general daily habit tracker';
    const prompt = `You are choosing a soft background mood for a personal habit-tracking calendar app (${label}). The user's current positive streak is ${streak} day(s), and in the last 7 days they've had ${recentYes} "Yes" (off-track) day(s). A longer streak and fewer Yes days should feel more cheerful, warm, and vibrant. More Yes days or a short/broken streak should feel a little more muted or wistful — but always gentle and tasteful, never harsh or upsetting. Respond with EXACTLY two hex color codes separated by a comma and nothing else: a light, paper-like background color first, then a deeper accent color second. Example format: #fdf6ec,#3d6b52`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 30,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join('')
        .trim();
      const matches = text.match(/#[0-9a-fA-F]{6}/g);
      if (matches && matches.length >= 2) {
        return { bg: matches[0], accent: matches[1] };
      }
    } catch (e) {
      console.error('mood color fetch failed', e);
    }
    return null;
  }

  async function updateCalendarMood() {
    const cal = activeCal;
    const streak = computeCurrentStreakFor(cal);
    const recentYes = countRecentYes(cal, 7);
    const cacheKey = `yesno:mood:${cal}:${streak}-${recentYes}`;
    let cached = null;
    try { cached = localStorage.getItem(cacheKey); } catch (e) { /* ignore */ }
    if (cached) {
      const [bg, accent] = cached.split('|');
      if (bg && accent) applyCalendarMoodColors(bg, accent);
      return;
    }
    const colors = await getAICalendarMoodColors(cal, streak, recentYes);
    if (colors && activeCal === cal) {
      applyCalendarMoodColors(colors.bg, colors.accent);
      try { localStorage.setItem(cacheKey, `${colors.bg}|${colors.accent}`); } catch (e) { /* ignore */ }
    }
  }

  function computeCurrentStreakFor(cal) {
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    let day = today.getDate();
    let streak = 0;
    for (let i = 0; i < 3650; i++) {
      const data = getMonthData(cal, year, month);
      if (ansOf(data[day]) !== 'no') break;
      streak++;
      day--;
      if (day < 1) {
        month--;
        if (month < 0) { month = 11; year--; }
        day = new Date(year, month + 1, 0).getDate();
      }
    }
    return streak;
  }

  function fallbackCrossSummary(streakA, streakB) {
    return `Calendar: ${streakA}日連続、Alcohol: ${streakB}日連続。この調子で。`;
  }

  async function getCrossCalendarSummaryText(streakA, streakB) {
    const prompt = `あなたは、2つの習慣を記録する個人用アプリの中にいる、温かく前向きな存在です。「Calendar」(一般的な日々の習慣)は現在「No」が${streakA}日連続しています。「Alcohol」(禁酒日)は現在「No」が${streakB}日連続しています。この2つのトラッカー全体の今日の調子について、20文字前後の短い一言を日本語で書いてください。表現や言い回しは毎回変えて、日によって同じような言い方にならないようにしてください。返答は本文のみとし、前置きや鍵括弧は付けないでください。`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join(" ")
        .trim();
      return text || fallbackCrossSummary(streakA, streakB);
    } catch (e) {
      return fallbackCrossSummary(streakA, streakB);
    }
  }

  async function updateCrossCalendarSummary() {
    const crossSummaryEl = document.getElementById('crossSummary');
    const streakA = computeCurrentStreakFor('a');
    const streakB = computeCurrentStreakFor('b');
    const message = await getCrossCalendarSummaryText(streakA, streakB);
    crossSummaryEl.textContent = message;
  }

  function loadMonth(d) {
    monthData = getMonthData(activeCal, d.getFullYear(), d.getMonth());
    render();
    updateStreakBanner();
    updateCrossCalendarSummary();
    updateCalendarMood();
    refreshVoiceBubble();
  }

  function saveMonth(d) {
    const key = monthKey(activeCal, d.getFullYear(), d.getMonth());
    try {
      localStorage.setItem(key, JSON.stringify(monthData));
    } catch (e) {
      console.error('save month failed', e);
    }
  }

  const weatherCache = {};

  function weatherMonthKey(year, month) {
    return `yesno:weather:${year}-${String(month + 1).padStart(2, '0')}`;
  }

  function getWeatherMonthData(year, month) {
    const key = weatherMonthKey(year, month);
    if (weatherCache[key]) return weatherCache[key];
    try {
      const raw = localStorage.getItem(key);
      weatherCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.error('load weather month failed', e);
      weatherCache[key] = {};
    }
    return weatherCache[key];
  }

  function saveWeatherMonthData(year, month) {
    const key = weatherMonthKey(year, month);
    try {
      localStorage.setItem(key, JSON.stringify(weatherCache[key] || {}));
    } catch (e) {
      console.error('save weather month failed', e);
    }
  }

  // Weather is shared between calendars: check the shared store first, and
  // fall back to weather embedded on either calendar's own entry (from before
  // weather became shared) so no previously-recorded weather is lost.
  function getWeatherForDay(year, month, day) {
    const shared = getWeatherMonthData(year, month)[day];
    if (shared) return shared;
    const aData = getMonthData('a', year, month);
    const bData = getMonthData('b', year, month);
    return weatherOf(aData[day]) || weatherOf(bData[day]) || '';
  }

  const voiceNoteCache = {};

  function voiceNoteMonthKey(year, month) {
    return `yesno:voicenote:${year}-${String(month + 1).padStart(2, '0')}`;
  }

  function getVoiceNoteMonthData(year, month) {
    const key = voiceNoteMonthKey(year, month);
    if (voiceNoteCache[key]) return voiceNoteCache[key];
    try {
      const raw = localStorage.getItem(key);
      voiceNoteCache[key] = raw ? JSON.parse(raw) : {};
    } catch (e) {
      voiceNoteCache[key] = {};
    }
    return voiceNoteCache[key];
  }

  function saveVoiceNote(year, month, day, text) {
    const data = getVoiceNoteMonthData(year, month);
    data[day] = text;
    try {
      localStorage.setItem(voiceNoteMonthKey(year, month), JSON.stringify(data));
    } catch (e) {
      console.error('save voice note failed', e);
    }
  }

  function getVoiceNote(year, month, day) {
    return getVoiceNoteMonthData(year, month)[day] || '';
  }

  function refreshVoiceBubble() {
    const bubble = document.getElementById('voiceBubble');
    if (!bubble) return;
    const today = new Date();
    const isViewingCurrentMonth = current.getFullYear() === today.getFullYear() && current.getMonth() === today.getMonth();
    const note = isViewingCurrentMonth ? getVoiceNote(today.getFullYear(), today.getMonth(), today.getDate()) : '';
    if (note) {
      bubble.innerHTML = `<span class="voice-icon">🎤</span>"${escapeHtml(note)}"`;
      bubble.style.display = '';
    } else {
      bubble.style.display = 'none';
    }
  }

  function isPredicted(entry) {
    return !!(entry && typeof entry === 'object' && entry.p);
  }

  let justConfirmedDay = null;
  let justConfirmedYesDay = null;

  async function setAnswer(day, value, isEditingToday) {
    let justConfirmedNo = false;
    if (value === null) {
      delete monthData[day];
    } else if (isEditingToday && new Date().getHours() < 18) {
      // entered before 6pm: treat as a tentative prediction for the day, not yet final
      monthData[day] = { a: value, p: true };
    } else {
      monthData[day] = { a: value };
      if (value === 'no') { justConfirmedDay = String(day); justConfirmedNo = true; }
      if (value === 'yes') justConfirmedYesDay = String(day);
    }
    await saveMonth(current);

  async function classifyVoiceInput(transcript, questionA, questionB) {
    const prompt = `You are helping a habit-tracking app understand a spoken check-in. The user spoke this (in Japanese): "${transcript}"

There are two daily check-in questions:
1. "Calendar" — "${questionA}"
2. "Alcohol" — "${questionB}"

Based on what the user said, decide whether they meant "yes" or "no" for each question. If the speech doesn't give any clue for one of the questions, use null for that one. Respond with ONLY a JSON object, no other text, in exactly this shape: {"calendar":"yes"|"no"|null,"alcohol":"yes"|"no"|null}`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 100,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join('')
        .trim();
      const cleaned = text.replace(/```json|```/g, '').trim();
      return JSON.parse(cleaned);
    } catch (e) {
      console.error('voice classification failed', e);
      return null;
    }
  }

      btn.classList.add('listening');
      btn.textContent = '🎤 聞いています…';
      statusEl.textContent = '';

      recognition.onresult = async (event) => {
        const transcript = event.results[0][0].transcript;
        btn.classList.remove('listening');
        btn.textContent = '🎤 話して入力';

        btn.textContent = '🎤 話して入力';
        console.error('speech recognition error:', e.error);
        const messages = {
          'not-allowed': 'マイクの使用が許可されていません。ブラウザの設定でマイクを許可してください。',
          'service-not-allowed': 'この環境では音声認識サービスを使用できません。',
          'network': '音声認識にはネットワーク接続が必要ですが、通信できませんでした。',
          'no-speech': '声が聞き取れませんでした。もう一度お試しください。',

      };
      recognition.onend = () => {
        btn.classList.remove('listening');
      };
      recognition.start();
    });
  }

  async function render() {
    const year = current.getFullYear();
    const month = current.getMonth();
    monthLabel.textContent = `${MONTH_NAMES[month]} ${year}`;

    const firstDay = (new Date(year, month, 1).getDay() + 6) % 7; // 0 = Monday, 6 = Sunday
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const today = new Date();

    const prevMonthDate = new Date(year, month - 1, 1);
    const prevDaysInMonth = new Date(prevMonthDate.getFullYear(), prevMonthDate.getMonth() + 1, 0).getDate();
    const prevData = getMonthData(activeCal, prevMonthDate.getFullYear(), prevMonthDate.getMonth());
    let runningStreak = trailingNoStreak(prevData, prevDaysInMonth);

    const nextMonthDate = new Date(year, month + 1, 1);
    const nextData = getMonthData(activeCal, nextMonthDate.getFullYear(), nextMonthDate.getMonth());

    const otherCal = activeCal === 'a' ? 'b' : 'a';
    const otherMonthData = getMonthData(otherCal, year, month);

    let html = '';
    for (let i = 0; i < firstDay; i++) {
      html += '<div class="day-cell empty"></div>';
    }

    let noCount = 0;
    for (let day = 1; day <= daysInMonth; day++) {
      const cellDate = new Date(year, month, day);
      const isToday = isSameDay(cellDate, today);
      const isFuture = cellDate > today && !isToday;
      const entry = monthData[day];
      const answer = ansOf(entry);
      const w = getWeatherForDay(year, month, day);
      if (answer === 'no') noCount++;

      let dayStreak = 0;
      if (answer === 'no') {
        runningStreak++;
        dayStreak = runningStreak;
      } else {
        runningStreak = 0;
      }

      let classes = 'day-cell';
      if (isToday) classes += ' today';
      if (isFuture) classes += ' future';
      if (!isFuture) classes += ' clickable';

      const holidayName = holidayNameFor(year, month, day);
      const realDow = cellDate.getDay(); // 0 = Sun, 6 = Sat, regardless of Monday-first grid
      if (holidayName || realDow === 0) {
        classes += ' date-sunday-or-holiday';
      } else if (realDow === 6) {
        classes += ' date-saturday';
      }

      const otherAnswer = ansOf(otherMonthData[day]);
      const isOverlapNo = answer === 'no' && otherAnswer === 'no';
      const isOverlapYes = answer === 'yes' && otherAnswer === 'yes';

      if (isOverlapYes) {
        classes += ' overlap-yes';
      } else if (isOverlapNo) {
        classes += ' overlap-no';
      } else if (answer === 'yes') {
        classes += ' answer-yes';
      } else if (answer === 'no') {
        classes += ' answer-no';
      }

      if (answer) {
        const dayOfWeek = cellDate.getDay();
        const prevAns = day === 1 ? ansOf(prevData[prevDaysInMonth]) : ansOf(monthData[day - 1]);
        const nextAns = day === daysInMonth ? ansOf(nextData[1]) : ansOf(monthData[day + 1]);
        if (dayOfWeek !== 1 && prevAns === answer) classes += ' chain-left';
        if (dayOfWeek !== 0 && nextAns === answer) classes += ' chain-right';
      }

      const icon = weatherIcon(w);
      const face = isOverlapYes ? '' : faceIconFor(answer, dayStreak);
      const iconRow = (icon || face)
        ? `<div class="icon-row">${icon ? `<span class="icon-slot">${icon}</span>` : ''}${face ? `<span class="icon-slot">${face}</span>` : ''}</div>`
        : '<div class="icon-row"></div>';

      let mainInner = '';
      const stillPredicted = isToday && isPredicted(entry);
      const overdueToConfirm = stillPredicted && new Date().getHours() >= 18;
      const nudgeHtml = overdueToConfirm ? `<div class="confirm-nudge">Fix?</div>` : '';
      if (answer === 'yes') {
        if (isOverlapYes) {
          mainInner = `<div class="cry-icon">😭</div>`;
        } else if (stillPredicted) {
          mainInner = `${nudgeHtml}<div class="mark-yes predicted"></div><div class="predicted-label">予測</div>`;
        } else {
          const yesJustConfirmed = String(day) === justConfirmedYesDay;
          if (yesJustConfirmed) justConfirmedYesDay = null; // consume the flag so it only plays once
          if (activeCal === 'b') {
            mainInner = `<div class="mark-yes wine-mark${yesJustConfirmed ? ' wine-tip-anim' : ''}">🍷</div>`;
          } else {
            mainInner = `<div class="mark-yes sigh-mark${yesJustConfirmed ? ' sigh-droop-anim' : ''}">😔</div>`;
          }
        }
      } else if (answer === 'no') {
        const badge = dayStreak >= 2 ? `<span class="stamp-badge">${dayStreak}</span>` : '';
        const justConfirmed = String(day) === justConfirmedDay;
        if (justConfirmed) justConfirmedDay = null; // consume the flag so it only plays once
        mainInner = stillPredicted
          ? `${nudgeHtml}<div class="stamp predicted">NO${badge}</div><div class="predicted-label">予測</div>`
          : `<div class="stamp${justConfirmed ? ' stamp-slam' : ''}">NO${badge}</div>`;
      } else if (isToday) {
        mainInner = `<button class="today-tap" data-day="${day}" data-action="open">👆</button>`;

      const inner = `
        <div class="cell-top">
          <div class="day-num"${holidayName ? ` title="${holidayName}"` : ''}>${day}</div>

      ? `<b>${noCount}</b> "No" day(s) recorded this month`
      : `No "No" days recorded yet this month`;
  }

  async function getCoords() {
    const geo = await new Promise((resolve) => {
      try {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 3000 }
        );
      } catch (e) {
        resolve(null);
      }
    });
    if (geo) return geo;
    // fall back to the fixed home location instead of IP lookup
    return HOME_LOCATION;
  }

  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return null;

    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

  function playNote(ctx, freq, startTime, duration, type, gainPeak) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
  }

  function jitterHz() {
    return (Math.random() * 10 - 5);
  }

  function playFeedbackSound(answerValue, isPrediction, calOverride) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    try {
      const now = ctx.currentTime + 0.02;
      const isCalB = (calOverride || activeCal) === 'b';

      if (isCalB && answerValue === 'no') {
        // Alcohol, "No" (didn't drink) — bright cork-pop + fizz, upbeat
        const base = 900 + jitterHz() * 4;
        playNote(ctx, base, now, 0.12, 'sine', isPrediction ? 0.12 : 0.22);
        playNote(ctx, base * 1.4 + jitterHz(), now + 0.06, 0.14, 'triangle', isPrediction ? 0.09 : 0.16);
        if (!isPrediction) playNote(ctx, base * 1.8 + jitterHz(), now + 0.13, 0.22, 'sine', 0.1);
      } else if (isCalB && answerValue === 'yes') {
        // Alcohol, "Yes" (drank) — low wobbly "glug glug", a bit deflated
        const notes = isPrediction ? [220, 190] : [240, 210, 180, 150];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.17, 0.2, 'sine', isPrediction ? 0.1 : 0.18);
        });
      } else if (answerValue === 'no') {
        // Calendar, "No" — upbeat ascending fanfare ("パッパラパッパ")
        const notes = isPrediction ? [523, 659] : [523, 659, 784, 1046];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.11, 0.16, 'triangle', isPrediction ? 0.12 : 0.2);
        });
      } else {
        // Calendar, "Yes" — droopy descending "sad trombone" ("フンフンフン")
        const notes = isPrediction ? [300, 260] : [330, 294, 262, 220];
        notes.forEach((f, i) => {
          playNote(ctx, f + jitterHz(), now + i * 0.19, 0.24, 'sawtooth', isPrediction ? 0.1 : 0.18);
        });
      }
    } catch (e) {
      console.error('sound playback failed', e);
    }
  }

    const isCalB = activeCal === 'b';
    const prompt = isCalB
      ? `あなたは、個人用の禁酒(お酒を飲まない日)記録アプリの中にいる、温かく応援してくれる存在です。ユーザーは今日の項目「${question}」について「No」(飲まない)という予測を立てました。夜の12時まであと${hoursLeft}時間ほどです。お酒に関連した言葉選び(例:「今夜は乾杯なしで」「シラフで乗り切ろう」など)を軽く交えつつ、20〜35文字程度で、押しつけがましくない温かい応援の一言を日本語で書いてください。返答は本文のみとし、鍵括弧や前置きは付けないでください。`
      : `You are a warm, supportive companion inside a personal daily habit-tracking app. The user just predicted "No" for today's check-in item: "${question}", with about ${hoursLeft} hours left until midnight. Write ONE short (max ~20 words), warm, genuinely encouraging sentence rooting for them to follow through today. Not preachy, no exclamation-point overload. Respond with only the sentence, no quotation marks, no preamble.`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = (data.content || [])
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join(" ")
        .trim();
      return text || fallbackPredictionMessage();
    } catch (e) {
      return fallbackPredictionMessage();
    }
  }

  async function showPredictionMessage(day, action) {
    const hoursLeft = hoursUntilMidnight();
    modalQuestion.textContent = '🔮 Prediction saved';
    modalDate.textContent = '';
    modalBody.innerHTML = `<div class="modal-status">One moment…</div>`;

    const message = action === 'no'
      ? await getPredictionEncouragement(hoursLeft, questionEl.textContent.trim())
      : '';

    modalBody.innerHTML = `
      <div class="modal-status">⏳ About ${hoursLeft} hour(s) left until midnight.</div>
      ${message ? `<div class="modal-status" style="font-style:italic;">${escapeHtml(message)}</div>` : ''}
      <div class="modal-buttons">
        <button class="modal-clear" data-action="ok">OK</button>
      </div>`;
    modalBody.querySelector('button[data-action="ok"]').addEventListener('click', closeModal);
  }

  function openModal(day) {
    const cellDate = new Date(current.getFullYear(), current.getMonth(), Number(day));
    const isEditingToday = isSameDay(cellDate, new Date());
    modalQuestion.textContent = questionEl.textContent.trim();
    modalDate.textContent = `${WEEKDAY_NAMES[cellDate.getDay()]}, ${MONTH_NAMES[cellDate.getMonth()]} ${day}`;

    const entry = monthData[day];
    const answer = ansOf(entry);
    const predicted = isEditingToday && isPredicted(entry);

    if (isEditingToday && bothCalendarsEmptyToday(day)) {
      modalBody.innerHTML = `
        <div class="modal-status" id="dailyChoiceMsg">今日という日を、少し考えています…</div>
        <button class="voice-input-btn" id="voiceInputBtn">🎤 話して入力</button>
        <div class="modal-status" id="voiceStatusMsg" style="min-height:0;"></div>
        <div class="combo-row">
          <div class="combo-label">Calendar</div>
          <div class="modal-buttons combo-buttons">
            <button class="modal-no" data-combo-cal="a" data-combo-action="no">No</button>
            <button class="modal-yes" data-combo-cal="a" data-combo-action="yes">Yes</button>
          </div>
        </div>
        <div class="combo-row">
          <div class="combo-label">Alcohol</div>
          <div class="modal-buttons combo-buttons">
            <button class="modal-no" data-combo-cal="b" data-combo-action="no">No</button>
            <button class="modal-yes" data-combo-cal="b" data-combo-action="yes">Yes</button>
          </div>
        </div>`;

      getDailyChoiceMessage().then(msg => {
        const el = document.getElementById('dailyChoiceMsg');
        if (el) el.textContent = msg;
      });

      async function applyComboAnswer(cal, action) {
        const rowBtn = modalBody.querySelector(`[data-combo-cal="${cal}"]`);
        if (!rowBtn) return; // already answered (e.g. voice named it twice)
        const willBePrediction = new Date().getHours() < 18;
        setAnswerForCal(cal, day, action, true);
        playFeedbackSound(action, willBePrediction, cal);
        if (action === 'no' && !willBePrediction) maybeCelebrateMilestone();

        const row = rowBtn.closest('.combo-row');
        const label = cal === 'a' ? 'Calendar' : 'Alcohol';
        row.innerHTML = `<div class="combo-label">${label}: <b>${action === 'yes' ? 'Yes' : 'No'}</b> ${willBePrediction ? '🔮' : '✓'}</div>`;

        if (cal === activeCal) {
          monthData = getMonthData(activeCal, current.getFullYear(), current.getMonth());
          render();
        }

        if (modalBody.querySelectorAll('[data-combo-cal]').length === 0) {
          // both calendars now answered — resolve the day's shared weather once, then close
          updateStreakBanner();
          updateCrossCalendarSummary();
          updateCalendarMood();
          await resolveWeatherThen(day, true, () => closeModal());
        }
      }

      modalBody.querySelectorAll('[data-combo-cal]').forEach(btn => {
        btn.addEventListener('click', () => {
          applyComboAnswer(btn.getAttribute('data-combo-cal'), btn.getAttribute('data-combo-action'));
        });
      });

      setupVoiceInput(day, getQuestionText('a'), getQuestionText('b'), applyComboAnswer);

      modalOverlay.classList.add('active');
      return;
    }

    if (predicted) {
      modalBody.innerHTML = `
        <div class="modal-status">🔮 Predicted <b>${answer === 'yes' ? 'Yes' : 'No'}</b> — not yet final.</div>
        <div class="modal-buttons">
          <button class="modal-yes" data-action="confirm">✅ Confirm ${answer === 'yes' ? 'Yes' : 'No'}</button>
          <button class="modal-clear" data-action="${answer === 'yes' ? 'no' : 'yes'}">🔁 Actually ${answer === 'yes' ? 'No' : 'Yes'}</button>
          <button class="modal-clear" data-action="clear">Clear</button>
        </div>`;
    } else if (answer === 'yes') {
      modalBody.innerHTML = `
        <div class="modal-status">Marked as <b>Yes</b>.</div>
        <div class="modal-buttons">
          <button class="modal-clear" data-action="clear">Clear answer</button>
        </div>`;
    } else if (answer === 'no') {
      modalBody.innerHTML = `
        <div class="modal-status">Marked as <b>No</b>.</div>
        <div class="modal-buttons">
          <button class="modal-clear" data-action="clear">Clear answer</button>
        </div>`;
    } else {
      modalBody.innerHTML = `
        ${isEditingToday && new Date().getHours() < 18 ? '<div class="modal-status">🔮 It\'s before 6 PM — this will be saved as a prediction until you confirm it later.</div>' : ''}
        <div class="modal-buttons">
          <button class="modal-no" data-action="no">No</button>
          <button class="modal-yes" data-action="yes">Yes</button>
        </div>`;
    }

    modalBody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.getAttribute('data-action');
        if (action === 'clear') {
          await setAnswer(day, null, isEditingToday);
          closeModal();
        } else if (action === 'confirm') {
          await confirmPrediction(day);
          const confirmedAnswer = ansOf(monthData[day]);
          playFeedbackSound(confirmedAnswer, false);
          const needsEncouragement = activeCal === 'b' ? confirmedAnswer === 'yes' : confirmedAnswer === 'no';
          await resolveWeatherThen(day, isEditingToday, () => {
            if (needsEncouragement) showEncouragement();
            else closeModal();
          });
        } else {
          const willBePrediction = isEditingToday && new Date().getHours() < 18;
          await setAnswer(day, action, isEditingToday);
          playFeedbackSound(action, willBePrediction);
          if (willBePrediction) {
            await showPredictionMessage(day, action);
          } else {
            const needsEncouragement = activeCal === 'b' ? action === 'yes' : action === 'no';
            await resolveWeatherThen(day, isEditingToday, () => {
              if (needsEncouragement) showEncouragement();
              else closeModal();
            });
          }
        }
      });
    });

    modalOverlay.classList.add('active');
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
  }

  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  function changeMonth(direction) {
    const grid = daysGrid;
    grid.style.transition = 'transform 0.2s ease, opacity 0.18s ease';
    grid.style.transform = `translateX(${direction > 0 ? '-18px' : '18px'})`;
    grid.style.opacity = '0';

    setTimeout(() => {
      current.setMonth(current.getMonth() + direction);
      loadMonth(current);

      grid.style.transition = 'none';
      grid.style.transform = `translateX(${direction > 0 ? '18px' : '-18px'})`;
      grid.style.opacity = '0';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          grid.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
          grid.style.transform = 'translateX(0)';
          grid.style.opacity = '1';
        });
      });
    }, 180);
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    changeMonth(-1);
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    changeMonth(1);
  });

  // Swipe left/right on the calendar to change months
  (function setupSwipe() {
    const gridCard = document.querySelector('.grid-card');
    let startX = null;
    let startY = null;

    gridCard.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });

    gridCard.addEventListener('touchend', (e) => {
      if (startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const endY = e.changedTouches[0].clientY;
      const dx = endX - startX;
      const dy = endY - startY;
      startX = null;
      startY = null;

      const SWIPE_THRESHOLD = 45;
      if (Math.abs(dx) < SWIPE_THRESHOLD || Math.abs(dx) < Math.abs(dy)) return;

      changeMonth(dx < 0 ? 1 : -1);
    }, { passive: true });
  })();

  questionEl.addEventListener('blur', saveQuestion);
  questionEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); questionEl.blur(); }
  });

  document.querySelectorAll('.cal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const cal = tab.getAttribute('data-cal');
      if (cal === activeCal) return;
      activeCal = cal;
      document.querySelectorAll('.cal-tab').forEach(t => t.classList.toggle('active', t === tab));
      document.body.classList.toggle('theme-b', activeCal === 'b');
      resetCalendarMoodColors();
      updateCalendarMood();
      loadQuestion();
      loadMonth(current);
    });
  });

  function collectBackupData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('yesno:')) {
        data[key] = localStorage.getItem(key);
      }
    }
    return data;
  }

  async function backupAndShare() {
    let json, filename, file;
    try {
      const data = collectBackupData();
      json = JSON.stringify(data, null, 2);
      const dateStr = new Date().toISOString().slice(0, 10);
      filename = `yesno-calendar-backup-${dateStr}.json`;
      file = new File([json], filename, { type: 'application/json' });
    } catch (e) {
      console.error('backup file creation failed', e);
      alert('Could not create the backup file.');
      return;
    }

    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: 'Yes/No Calendar Backup',
          text: 'Backup of your Yes/No Calendar data. Save this somewhere safe, like Google Drive.'
        });
        return;
      }
    } catch (e) {
      if (e && e.name === 'AbortError') return; // user cancelled the share sheet
      console.error('share failed, falling back to download', e);
      // fall through to the plain download below
    }

    try {
      const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      alert('Sharing isn\'t available here, so the backup file was downloaded instead. You can upload it to Google Drive manually from your Downloads.');
    } catch (e) {
      console.error('download fallback failed', e);
      alert('Could not create the backup file.');
    }
  }

  function restoreFromFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(String(reader.result || '{}'));
        let count = 0;
        Object.keys(data).forEach(key => {
          if (key.startsWith('yesno:')) {
            localStorage.setItem(key, data[key]);
            count++;
          }
        });
        // clear in-memory caches so the restored data is picked up
        Object.keys(monthCache).forEach(k => delete monthCache[k]);
        Object.keys(weatherCache).forEach(k => delete weatherCache[k]);
        loadQuestion();
        loadMonth(current);
        alert(`Restored ${count} record(s) from backup.`);
      } catch (e) {
        console.error('restore failed', e);
        alert('That file doesn\'t look like a valid backup.');
      }
    };
    reader.onerror = () => alert('Could not read that file.');
    reader.readAsText(file);
  }

  document.getElementById('backupShareBtn').addEventListener('click', backupAndShare);
  document.getElementById('restoreBtn').addEventListener('click', () => {
    document.getElementById('restoreFileInput').click();
  });
  document.getElementById('restoreFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) restoreFromFile(file);
    e.target.value = '';
  });

  (async function init() {
    document.body.classList.toggle('theme-b', activeCal === 'b');
    await loadQuestion();
    await loadMonth(current);
    updateCrossCalendarSummary();
    updateCalendarMood();
  })();
</script>
</body>
</html>
